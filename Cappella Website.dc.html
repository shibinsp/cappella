  <link rel="stylesheet" href="components/fig-assets.css">
  <style>
    html, body { margin: 0; padding: 0; background: rgb(255,255,255); }
    a { color: rgb(209,32,47); text-decoration: none; }
    a:hover { color: rgb(170,20,34); }

    /* ===== GLOBAL TEXT RULE =====
       The design is a fixed-width Figma export where several text layers were
       authored with white-space:nowrap inside fixed-width boxes. On any narrower
       render that makes long copy overflow its box and get clipped at the crop
       edge. This global rule forces every text node inside the page to wrap and
       break within its box instead of running off — so nothing is ever clipped.
       Short labels/headings/stat numbers still fit on one line naturally. */
    #cap-scaler span,
    #cap-scaler p,
    #cap-scaler h1,
    #cap-scaler h2,
    #cap-scaler h3 {
      white-space: normal !important;
      overflow-wrap: normal;
      word-break: normal;
      text-wrap: pretty;
    }
    /* nav-overlay links must stay on one line (beats the global rule) */
    #cap-scaler span.cap-nav { white-space: nowrap !important; }

    /* ===== SCROLL ANIMATION BASE STYLES ===== */
    @media (prefers-reduced-motion: no-preference) {
      /* Elements that will be revealed on scroll */
      .cap-scroll-reveal {
        opacity: 0;
        transform: translateY(40px);
        transition: opacity 0.75s cubic-bezier(0.22, 1, 0.36, 1),
                    transform 0.75s cubic-bezier(0.22, 1, 0.36, 1);
        will-change: opacity, transform;
      }
      .cap-scroll-reveal.cap-revealed {
        opacity: 1;
        transform: translateY(0);
      }
      /* Stagger delays for child items */
      .cap-scroll-reveal.cap-delay-1 { transition-delay: 0.1s; }
      .cap-scroll-reveal.cap-delay-2 { transition-delay: 0.2s; }
      .cap-scroll-reveal.cap-delay-3 { transition-delay: 0.3s; }
      .cap-scroll-reveal.cap-delay-4 { transition-delay: 0.4s; }
      .cap-scroll-reveal.cap-delay-5 { transition-delay: 0.5s; }

      /* Slide-in from left */
      .cap-slide-left {
        opacity: 0;
        transform: translateX(-60px);
        transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1),
                    transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        will-change: opacity, transform;
      }
      .cap-slide-left.cap-revealed {
        opacity: 1;
        transform: translateX(0);
      }

      /* Scale-up reveal */
      .cap-scale-reveal {
        opacity: 0;
        transform: scale(0.88);
        transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1),
                    transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        will-change: opacity, transform;
      }
      .cap-scale-reveal.cap-revealed {
        opacity: 1;
        transform: scale(1);
      }

      /* Clip reveal — text slides up from a masked box */
      .cap-clip-reveal {
        overflow: hidden;
      }
      .cap-clip-reveal > * {
        display: block;
        transform: translateY(100%);
        transition: transform 0.85s cubic-bezier(0.22, 1, 0.36, 1);
        will-change: transform;
      }
      .cap-clip-reveal.cap-revealed > * {
        transform: translateY(0);
      }
    }

    /* Hero intro line animation */
    .cap-hero-line {
      position: absolute;

      height: 2px;
      background: rgba(255,255,255,0.35);

      transform-origin: left;

    @media (prefers-reduced-motion: no-preference) {

        transition: transform 1.1s cubic-bezier(0.22, 1, 0.36, 1);
      }

    .cap-logo-path {

    :root {

    }
    @media (prefers-reduced-motion: no-preference) {
      #cap-grain { animation: capGrain 0.7s steps(7) infinite; }

    @keyframes capGrain {

      14%  { transform: translate(-38px, 22px); }
      28%  { transform: translate(24px, -44px); }

    /* ===== OCI-STYLE MENU OVERLAY ===== */
    #cap-menu-btn {

    #cap-menu-overlay.cap-menu-open { visibility: visible; pointer-events: auto; }
    #cap-menu-backdrop {
      position: absolute;

    .cap-menu-row {

    .cap-menu-open .cap-menu-row { opacity: 1; transform: translateY(0); }
    .cap-menu-label {
      font-family: 'Space Mono', monospace;

    .cap-menu-info {
      text-align: right;

    .cap-menu-info a { color: rgb(209, 32, 47); cursor: pointer; display: inline-block; }

    .cap-menu-email {
      display: flex;

    /* ===== FOOTER PREMIUM ===== */
    .cap-ft-link { position: relative; }
    .cap-ft-link::after {

  </style>

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() {
    const FRAME_W = 1440, FRAME_H = 7472;

    // Preloader must start immediately, not after the 1600ms hydration delay
    this._setupPreloader();

    // Run footer adjustments synchronously so that subsequent layout caches are accurate
    const scaler = document.getElementById('cap-scaler');
    if (scaler) {
      const footerShiftTop = 0; // Keeping top at 7092 prevents overlap with operators section
      const footerHeight = 530;   // Compact footer height (reduced from 734px)
      
      const adjustFooter = () => {
        const allEls = scaler.querySelectorAll('*');
        for (let i = 0; i < allEls.length; i++) {
          const el = allEls[i];
          let originalTop = el.getAttribute('data-original-top');
          if (!originalTop) {
            const topVal = parseFloat(el.style.top);
            if (!isNaN(topVal) && topVal >= 7092 && topVal <= 8372) {
              originalTop = topVal.toString();
              el.setAttribute('data-original-top', originalTop);
            }
          }
          
          if (originalTop) {
            const orig = parseFloat(originalTop);
            if (orig === 7092) {
              el.style.top = (7092 - footerShiftTop) + 'px';
              el.style.height = footerHeight + 'px';
              el.style.zIndex = '2';
              
              // Scale down and center the giant white interlocking logo
              const logo = el.querySelector('.fig-asset-c9d8f12cf6e90c99');
              if (logo) {
                logo.style.width = '305px';
                logo.style.height = '280px';
                logo.style.left = '213px'; // Centered horizontally (202px + 11px container offset)
                logo.style.top = '80px';
              }
              
              const redBg = el.querySelector('div');
              if (redBg) {
                redBg.style.top = '0px';
                redBg.style.height = footerHeight + 'px';
              }

              // Shift vertical dividing lines to avoid crossing texts
              [...el.querySelectorAll('svg')].forEach(svg => {
                const transform = svg.style.transform || '';
                if (transform.includes('matrix(')) {
                  const match = transform.match(/matrix\(([^,]+),([^,]+),([^,]+),([^,]+),([^,]+),([^)]+)\)/);
                  if (match) {
                    const tx = parseFloat(match[5]);
                    const ty = parseFloat(match[6]);
                    if (Math.abs(tx - 737) < 3) {
                      svg.style.transform = `matrix(${match[1]},${match[2]},${match[3]},${match[4]},700,${ty})`;
                    } else if (Math.abs(tx - 1097) < 3 || Math.abs(tx - 1094) < 3) {
                      svg.style.transform = `matrix(${match[1]},${match[2]},${match[3]},${match[4]},1059,${ty})`;
                    }
                  }
                }
              });

              // Adjust STAY IN TOUCH and email input block relative coordinates to avoid overlap
              const stayInTouch = [...el.querySelectorAll('span')].find(s => (s.textContent || '').trim() === 'STAY IN TOUCH');
              if (stayInTouch) {
                stayInTouch.style.top = '300px';
                stayInTouch.style.left = '1117px'; // Aligned horizontally (1106px + 11px container offset)
              }
              const designerBox = [...el.querySelectorAll('div')].find(d => d.style.boxShadow && d.style.boxShadow.includes('inset'));
              if (designerBox) {
                designerBox.style.top = '335px';
                designerBox.style.left = '1124px'; // Aligned horizontally (1113px + 11px container offset)
              }
              const emailInput = el.querySelector('input[type="email"]');
              if (emailInput) {
                emailInput.style.top = '345px';
                emailInput.style.left = '1124px';
              } else {
                const emailSpan = [...el.querySelectorAll('span')].find(s => (s.textContent || '').trim() === 'Your Email Id');
                if (emailSpan) {
                  emailSpan.style.top = '345px';
                  emailSpan.style.left = '1124px';
                }
              }
              const arrowSvg = [...el.querySelectorAll('svg')].find(s => {
                const leftVal = parseFloat(s.style.left);
                return leftVal >= 1300 && leftVal <= 1320;
              });
              if (arrowSvg) {
                arrowSvg.style.top = '360px';
                arrowSvg.style.left = '1318px'; // Aligned horizontally (1307px + 11px container offset)
              }
            } else {
              // Determine shift based on original coordinate section
              let shift = footerShiftTop;
              if (orig >= 7500 && orig < 7650) {
                shift = 300; // middle section elements (Connect / Stay in Touch)
              } else if (orig >= 7650) {
                // Shift designer credit elements by 348px instead of 378px to avoid overlaps
                if (orig === 7723 || orig === 7750) {
                  shift = 348;
                } else {
                  shift = 378; // bottom section elements (Partner logos / credits)
                }
              }
              el.style.top = (orig - shift) + 'px';
              el.style.zIndex = '3';

              // Apply fine alignment corrections for shifted elements
              if (orig === 7734 || orig === 7732 || orig === 7728) {
                // Align partner logos to the exact same vertical line (relative top ~412px, absolute 7504px)
                el.style.top = '7504px';
              } else if (orig === 7750) {
                // Limitless logo
                el.style.left = '1113px'; // Left-aligned with email input
                el.style.top = '7504px';
              } else if (orig === 7723 || orig === 7718) {
                // Designed by text
                el.style.left = '1113px'; // Left-aligned with email input
                el.style.top = '7504px';
              } else if (orig === 7688) {
                // "An Initiative by" span
                el.style.left = '265px'; // Centered horizontally under the white logo
                el.style.top = '7472px';
              }
            }
          }
        }
        scaler.style.height = (7092 - footerShiftTop + footerHeight) + 'px';
      };

      // Initial run
      adjustFooter();

      // Observe React hydration or updates to keep layout intact.
      // Animations (gsap scrubs, the logo marquee) write style attributes
      // every frame — running adjustFooter + _fit 60x/s janks the footer.
      // Run immediately for childList changes (hydration); coalesce
      // attribute-only bursts until the stream has been idle for 400ms.
      const OBS_CFG = { attributes: true, childList: true, subtree: true, attributeFilter: ['style'] };
      let styleSettleT = null;
      const runAdjust = () => {
        observer.disconnect();
        adjustFooter();
        if (this._fit) this._fit();
        observer.observe(scaler, OBS_CFG);
      };
      const observer = new MutationObserver((muts) => {
        if (muts.some(mu => mu.type === 'childList')) {
          clearTimeout(styleSettleT);
          runAdjust();
          return;
        }
        clearTimeout(styleSettleT);
        styleSettleT = setTimeout(runAdjust, 400);
      });
      observer.observe(scaler, OBS_CFG);
    }

    this._fit = () => {
      const scalerEl = document.getElementById('cap-scaler');
      const vp = document.getElementById('cap-viewport');
      if (!scalerEl || !vp) return;
      const s = vp.clientWidth / FRAME_W;
      scalerEl.style.transform = 'scale(' + s + ')';
      const currentH = parseFloat(scalerEl.style.height) || FRAME_H;
      vp.style.height = (currentH * s) + 'px';
    };
    this._fit();
    // re-fit after fonts/images settle and on resize
    this._t1 = setTimeout(this._fit, 300);
    this._t2 = setTimeout(this._fit, 1200);
    window.addEventListener('resize', this._fit);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(this._fit);

    // ===== STAIRCASE SCROLL REVEAL =====
    this._setupReveal();

    // ===== IMMEDIATE LOGO HIDE (Portfolio Red C logo fix) =====
    // The red interlocking C logo sits at left:309, top:4464 in Figma which
    // overlaps the "Hyderabad" city text. alignLogo() (called 1.6s later) repositions
    // it correctly — but we must hide it NOW so it never flashes at the wrong spot.
    (() => {
      const tryHideLogo = () => {
        const scalerEl = document.getElementById('cap-scaler');
        if (!scalerEl) { setTimeout(tryHideLogo, 100); return; }
        const logoEl = scalerEl.querySelector('.fig-asset-eae7f9bdb03982f5-132fb376');
        if (logoEl) {
          logoEl.style.opacity = '0';
          logoEl.style.transition = 'opacity 0.25s ease';
        } else {
          setTimeout(tryHideLogo, 100);
        }
      };
      tryHideLogo();
    })();

    // ===== First-page effects: dot grid + spotlight cursor + nav text scramble =====
    this._setupDotGrid();
    this._setupNavScramble();

    // ===== PREMIUM PASS: film grain (viewport-level, no frame needed) =====
    // OCI reference: native cursor only — no custom cursor, ring, or spotlight
    this._setupGrain();
    this._setupMenuOverlay();

    // ===== DEFERRED ANIMATIONS =====
    // Wait for the Figma frame (x-import) to hydrate its DOM before querying elements.
    // The frame renders async, so 1.6s covers the worst case render + font settle.
    this._t3 = setTimeout(() => {
      this._setupScrollReveals();
      this._setupStatCounters();
      this._setupPortfolioInteraction();
      this._setupAccordion();
      // this._setupMetaLabels();
      this._setupJourneyStory();
      this._setupFooterAnimations();
      this._setupOperatorsMarquee();
      this._setupDitherEntries();
    }, 1600);

    // Hero intro: slight delay so first-frame paint is visible before elements vanish
    this._t4 = setTimeout(() => this._setupHeroIntro(), 200);
    this._t5 = setTimeout(() => this._setupHeroTitle(), 250);
  }

  _setupDotGrid() {
    const canvas = document.getElementById('cap-dotgrid');
    if (!canvas) { if ((this._dgTries = (this._dgTries || 0) + 1) < 40) setTimeout(() => this._setupDotGrid(), 200); return; }
    const ctx = canvas.getContext('2d');
    const W = 1440, H = 830, dotSize = 1.4, gap = 1.6, cell = dotSize + gap;
    const baseA = 0.16, activeA = 0.95;
    const cols = Math.floor((W + gap) / cell), rows = Math.floor((H + gap) / cell);
    const gridW = cell * cols - gap, gridH = cell * rows - gap;
    const sx = (W - gridW) / 2 + dotSize / 2, sy = (H - gridH) / 2 + dotSize / 2;
    const dots = [];
    for (let y = 0; y < rows; y++) for (let x = 0; x < cols; x++) {
      const cx = sx + x * cell, cy = sy + y * cell;
      dots.push({ cx, cy, ox: 0, oy: 0,
        p1: cx * 0.011 + cy * 0.006, p2: cy * 0.018, p3: cx * 0.009 + cy * 0.004 });
    }
    // Pixel-buffer renderer: 130k+ fillRect calls per frame run at slideshow
    // speed; writing pixels into one ImageData and blitting it once is ~60fps.
    canvas.width = W; canvas.height = H;
    const frame = ctx.createImageData(W, H);
    const px32 = new Uint32Array(frame.data.buffer);
    // sine lookup table — 3 trig calls x 130k dots per frame is the other hotspot
    const SIN_N = 4096, SIN_MASK = SIN_N - 1, SIN_K = SIN_N / (Math.PI * 2);
    const SIN = new Float32Array(SIN_N);
    for (let i = 0; i < SIN_N; i++) SIN[i] = Math.sin((i / SIN_N) * Math.PI * 2);
    const fsin = (v) => SIN[((v * SIN_K) | 0) & SIN_MASK];
    const fcos = (v) => SIN[(((v * SIN_K) | 0) + SIN_N / 4) & SIN_MASK];

    // ===== WATER-FLOW CURSOR FIELD =====
    // No impulse kicks: every frame each dot eases toward a continuous target
    // displacement (surface bulge + directional drag + ripple rings), which is
    // what makes the response read as fluid instead of twitchy.
    const P = { x: -9999, y: -9999, lastX: 0, lastY: 0, lastT: 0, vx: 0, vy: 0 };
    let smoothX = -9999, smoothY = -9999;
    let sVX = 0, sVY = 0;              // smoothed cursor velocity (the wake direction)
    const R = 150, R2 = R * R;         // cursor influence radius
    const BULGE = 16;                  // how far the surface parts around the cursor
    const rings = [];                  // expanding click/wake ripples
    let lastWake = 0;
    let isMoving = false;
    let cursorGlow = 0;
    let dgIdleTimeout = null;

    const sc = () => { const e = document.getElementById('cap-scaler'); const m = (e.style.transform || '').match(/scale\(([^)]+)\)/); return m ? parseFloat(m[1]) : 1; };
    const onMove = (e) => {
      const s = sc(), r = canvas.getBoundingClientRect(), now = performance.now(), dt = P.lastT ? Math.max(now - P.lastT, 1) : 16;
      const nx = (e.clientX - r.left) / s, ny = (e.clientY - r.top) / s;
      P.vx = (nx - P.lastX) / dt * 1000; P.vy = (ny - P.lastY) / dt * 1000;
      P.lastX = nx; P.lastY = ny; P.lastT = now; P.x = nx; P.y = ny;
      
      isMoving = true;
      clearTimeout(dgIdleTimeout);
      dgIdleTimeout = setTimeout(() => {
        isMoving = false;
      }, 250); // 250ms idle threshold

      // fast strokes shed small wake ripples behind the cursor, like a hand through water
      const speed = Math.hypot(P.vx, P.vy);
      if (speed > 550 && now - lastWake > 110 && ny > -50 && ny < H + 50) {
        lastWake = now;
        rings.push({ x: nx, y: ny, r: 10, speed: 3.2, amp: 7, sigma: 22 });
      }
    };
    const onClick = (e) => {
      const s = sc(), r = canvas.getBoundingClientRect();
      const cx = (e.clientX - r.left) / s, cy = (e.clientY - r.top) / s;
      if (cy < -50 || cy > H + 50) return;
      // a dropped-stone ripple: main crest + a softer follower
      rings.push({ x: cx, y: cy, r: 6, speed: 5.2, amp: 22, sigma: 30 });
      rings.push({ x: cx, y: cy, r: -34, speed: 5.2, amp: 12, sigma: 24 });
    };
    window.addEventListener('mousemove', onMove, { passive: true });
    window.addEventListener('mouseleave', () => { P.x = -9999; P.y = -9999; isMoving = false; });
    window.addEventListener('click', onClick);

    const draw = () => {
      // Hero off-screen -> skip all physics/painting, just idle the loop
      const rect = canvas.getBoundingClientRect();
      if (rect.bottom < 0 || rect.top > window.innerHeight) {
        this._dgRaf = requestAnimationFrame(draw);
        return;
      }
      const T = (this._dgT = (this._dgT || 0) + 0.025); // ambient water time
      px32.fill(0);

      // Spring-smoothed cursor position (organic tracking)
      if (P.x > -9000) {
        if (smoothX < -9000) { smoothX = P.x; smoothY = P.y; this._dgVX = 0; this._dgVY = 0; }
        if (!this._dgVX) { this._dgVX = 0; this._dgVY = 0; }
        this._dgVX += (P.x - smoothX) * 0.07; this._dgVY += (P.y - smoothY) * 0.07;
        this._dgVX *= 0.78; this._dgVY *= 0.78;
        smoothX += this._dgVX; smoothY += this._dgVY;
      } else { smoothX = -9999; smoothY = -9999; }
      
      // Smoothly update cursorGlow multiplier (fast fade in, slow decay on idle)
      const targetGlow = (isMoving && P.x > -9000) ? 1.0 : 0.0;
      cursorGlow += (targetGlow - cursorGlow) * (isMoving ? 0.12 : 0.06);
      canvas.style.opacity = cursorGlow;

      // Smoothed velocity — decays gently so the wake trails and settles
      sVX += (((P.x > -9000) ? P.vx : 0) - sVX) * 0.06;
      sVY += (((P.x > -9000) ? P.vy : 0) - sVY) * 0.06;
      const dragX = Math.max(-30, Math.min(30, sVX * 0.022));
      const dragY = Math.max(-30, Math.min(30, sVY * 0.022));

      // Advance ripples
      for (let i = rings.length - 1; i >= 0; i--) {
        const g = rings[i];
        g.r += g.speed;
        g.amp *= 0.962;
        if (g.amp < 0.35 || g.r - 4 * g.sigma > Math.hypot(W, H)) rings.splice(i, 1);
      }

      for (const d of dots) {
        // ambient flowing-water shimmer
        const wave = fsin(d.p1 + T) + fsin(d.p2 - T * 1.25);
        const wx = fcos(d.p3 + T * 0.9) * 2.6;
        const wy = wave * 2.4;
        let a = baseA * (0.45 + 0.55 * (wave * 0.5 + 0.5));

        // target displacement this frame
        let tx = 0, ty = 0;

        // 1. surface bulge + directional drag around the cursor (only active/visible when cursorGlow > 0)
        const dx = d.cx - smoothX, dy = d.cy - smoothY, dsq = dx * dx + dy * dy;
        const currentR2 = R2 * cursorGlow;
        if (cursorGlow > 0.005 && dsq <= currentR2) {
          const dist = Math.sqrt(dsq) || 0.5;
          const currentR = R * Math.sqrt(cursorGlow);
          let t = 1 - dist / currentR;
          t = t * t * (3 - 2 * t); // smoothstep falloff
          tx += (dx / dist) * BULGE * t * cursorGlow + dragX * t * cursorGlow;
          ty += (dy / dist) * BULGE * t * cursorGlow + dragY * t * cursorGlow;
          a = Math.max(a, baseA + (activeA - baseA) * t * cursorGlow);
        }

        // 2. ripple rings — a gaussian crest passing through the dot
        for (const g of rings) {
          if (g.r < 0) continue;
          const bb = g.r + 3.5 * g.sigma;
          const gx = d.cx - g.x, gy = d.cy - g.y;
          if (gx > bb || gx < -bb || gy > bb || gy < -bb) continue;
          const gd = Math.sqrt(gx * gx + gy * gy) || 0.5;
          const off = gd - g.r;
          if (off > 3.5 * g.sigma || off < -3.5 * g.sigma) continue;
          const crest = Math.exp(-(off * off) / (2 * g.sigma * g.sigma));
          const push = g.amp * crest;
          tx += (gx / gd) * push;
          ty += (gy / gd) * push;
          a = Math.min(0.95, a + crest * (g.amp / 22) * 0.5); // the crest glints
        }

        // ease toward the target — this is the water smoothness
        d.ox += (tx - d.ox) * 0.09;
        d.oy += (ty - d.oy) * 0.09;

        const ix = (d.cx + d.ox + wx) | 0, iy = (d.cy + d.oy + wy) | 0;
        if (ix >= 0 && ix < W && iy >= 0 && iy < H) {
          const A = (a * 255) | 0;
          px32[iy * W + ix] = (A << 24) | 0x00FFFFFF; // white, alpha A (little-endian)
          if (a > 0.45 && ix + 1 < W && iy + 1 < H) {
            // bright dots (cursor glow / ripple crests) get a 2x2 glint
            const A2 = (a * 140) | 0;
            const half = (A2 << 24) | 0x00FFFFFF;
            px32[iy * W + ix + 1] = half;
            px32[(iy + 1) * W + ix] = half;
          }
        }
      }
      ctx.putImageData(frame, 0, 0);
      this._dgRaf = requestAnimationFrame(draw);
    };
    draw();
  }

  _setupNavScramble() {
    const labels = ['ABOUT US', 'PROJECTS', 'TEAM', 'CONTACT US'];
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ#%&*<>/';
    const spans = [...document.querySelectorAll('#cap-scaler span')].filter((s) => {
      const t = (s.textContent || '').trim();
      const r = s.getBoundingClientRect();
      return labels.includes(t) && r.top < 300;
    });
    if (spans.length < 4 && (this._navTries = (this._navTries || 0) + 1) < 40) {
      setTimeout(() => this._setupNavScramble(), 200);
      return;
    }
    spans.forEach((el) => {
      const target = (el.textContent || '').trim();
      el.classList.add('cap-nav'); // nowrap exception — keeps CONTACT US on one line
      el.style.cursor = 'pointer';
      let iv = null;
      el.addEventListener('mouseenter', () => {
        let frame = 0;
        clearInterval(iv);
        iv = setInterval(() => {
          el.textContent = target.split('').map((c, i) => {
            if (c === ' ') return ' ';
            if (i < frame / 2.4) return target[i];
            return chars[Math.floor(Math.random() * chars.length)];
          }).join('');
          frame++;
          if (frame / 2.4 >= target.length) { clearInterval(iv); el.textContent = target; }
        }, 32);
      });
    });
  }

  _setupHeroIntro() {
    const scaler = document.getElementById('cap-scaler');
    if (!scaler) return;

    // 1. VERTICAL GRID LINES REVEAL (scales scaleX from 0 to 1 for rotated 90deg SVGs)
    const svgs = [...scaler.querySelectorAll('svg')].filter(el => {
      const top = parseFloat(el.style.top) || 0;
      if (top > 1000) return false;
      const transform = el.style.transform || '';
      return transform.includes('matrix(0,1,-1,0') || transform.includes('matrix(0, 1, -1, 0');
    });

    svgs.forEach((el, idx) => {
      const originalTransform = el.style.transform || '';
      el.style.transformOrigin = '0 0';
      el.style.transform = originalTransform + ' scaleX(0)';
      el.style.transition = 'transform 1.6s cubic-bezier(0.16, 1, 0.3, 1)';
      
      setTimeout(() => {
        el.style.transform = originalTransform + ' scaleX(1)';
      }, 100 + idx * 80);
    });

    // 2. SPLIT-TEXT CHAR STAGGER WAVE REVEAL
    const headings = [...scaler.querySelectorAll('span, p, h1, h2, h3')].filter(el => {
      const top = parseFloat(el.style.top) || 0;
      if (top > 850) return false;
      const style = window.getComputedStyle(el);
      const fontSize = parseFloat(style.fontSize) || 0;
      const txt = (el.textContent || '').trim();
      return fontSize >= 24 && txt.length > 3 && !el.querySelector('*') && txt !== 'CAPPELLA';
    });

    headings.forEach((el) => {
      const originalText = el.textContent || '';
      el.innerHTML = '';
      
      const words = originalText.split(/\s+/);
      const wordSpans = words.map(word => {
        const charSpans = word.split('').map(char => {
          const s = document.createElement('span');
          s.textContent = char;
          s.style.display = 'inline-block';
          s.style.opacity = '0';
          s.style.transform = 'translateY(110%)';
          s.style.transition = 'transform 0.8s cubic-bezier(0.215, 0.61, 0.355, 1), opacity 0.8s ease';
          return s;
        });
        
        const wordContainer = document.createElement('span');
        wordContainer.style.display = 'inline-block';
        wordContainer.style.overflow = 'hidden';
        wordContainer.style.whiteSpace = 'nowrap';
        wordContainer.style.verticalAlign = 'bottom';
        wordContainer.style.marginRight = '0.22em';
        
        charSpans.forEach(cs => wordContainer.appendChild(cs));
        return { container: wordContainer, chars: charSpans };
      });

      wordSpans.forEach(ws => el.appendChild(ws.container));

      const allChars = wordSpans.flatMap(ws => ws.chars);

      setTimeout(() => {
        allChars.forEach((cs, cIdx) => {
          setTimeout(() => {
            cs.style.opacity = '1';
            cs.style.transform = 'translateY(0)';
          }, cIdx * 20);
        });
      }, 250);
    });
  }

  _setupHeroTitle() {
    // The 100px headline ("India's Leading / Edu-Infra Asset / Management
    // Company") is a single span with <br> children, so the generic char
    // reveal above skips it (!el.querySelector('*')). Animate it here:
    // per-line masks, chars rising with a settle rotation, then a
    // scroll-linked exit where each line drifts up into its mask and fades.
    const scaler = document.getElementById('cap-scaler');
    const heroTitle = scaler && [...scaler.querySelectorAll('span')].find(el => {
      const top = parseFloat(el.style.top) || 0;
      const fs = parseFloat(window.getComputedStyle(el).fontSize) || 0;
      return top < 850 && fs >= 90;
    });
    if (!heroTitle) {
      if ((this._htTries = (this._htTries || 0) + 1) < 40) setTimeout(() => this._setupHeroTitle(), 200);
      return;
    }
    if (heroTitle.dataset.capAnimated) return;
    heroTitle.dataset.capAnimated = '1';
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    // Rebuild the span preserving its <br> line structure
    const lines = [];
    let current = [];
    [...heroTitle.childNodes].forEach(n => {
      if (n.nodeType === Node.ELEMENT_NODE && n.tagName === 'BR') {
        lines.push(current.join(' '));
        current = [];
      } else if (n.textContent && n.textContent.trim()) {
        current.push(n.textContent.trim());
      }
    });
    if (current.length) lines.push(current.join(' '));
    if (!lines.length) return;

    heroTitle.innerHTML = '';
    const lineEls = lines.map(lineText => {
      const lineMask = document.createElement('span');
      lineMask.style.cssText = 'display:block; overflow:hidden; white-space:nowrap;';
      const lineInner = document.createElement('span');
      lineInner.style.cssText = 'display:block; will-change:transform;';
      const chars = [];
      lineText.split(/\s+/).forEach((word, wi, arr) => {
        const w = document.createElement('span');
        w.style.cssText = 'display:inline-block; white-space:nowrap;' +
          (wi < arr.length - 1 ? ' margin-right:0.25em;' : '');
        word.split('').forEach(ch => {
          const c = document.createElement('span');
          c.textContent = ch;
          c.style.cssText =
            'display:inline-block; opacity:0;' +
            'transform:translateY(115%) rotate(6deg); transform-origin:0% 100%;' +
            'transition: transform 1.05s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.5s ease;';
          w.appendChild(c);
          chars.push(c);
        });
        lineInner.appendChild(w);
      });
      lineMask.appendChild(lineInner);
      heroTitle.appendChild(lineMask);
      return { lineInner, chars };
    });

    // Staggered entrance: line by line, chars cascading within each line.
    // Base delay syncs with the preloader wipe (slides away at ~1.1s) so the
    // reveal is actually visible instead of finishing behind the red screen.
    lineEls.forEach((L, li) => {
      L.chars.forEach((c, ci) => {
        setTimeout(() => {
          c.style.opacity = '1';
          c.style.transform = 'translateY(0) rotate(0deg)';
        }, 1150 + li * 140 + ci * 20);
      });
    });

    // Scroll-linked parallax exit — lower lines leave faster for depth
    if (window.gsap && window.ScrollTrigger) {
      lineEls.forEach((L, li) => {
        window.gsap.to(L.lineInner, {
          y: -(40 + li * 30),
          opacity: 0,
          ease: 'none',
          scrollTrigger: {
            trigger: document.getElementById('cap-viewport'),
            start: 'top top',
            end: () => '+=' + window.innerHeight * 0.8,
            scrub: true
          }
        });
      });
    }
  }

  _setupScrollReveals() {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const scaler = document.getElementById('cap-scaler');
    if (!scaler) return;

    // Helper: get element's true top in page (px), accounting for scaler scale
    const getScaledTop = (el) => {
      const s = parseFloat((scaler.style.transform || 'scale(1)').match(/scale\(([^)]+)\)/)?.[1] || '1');
      const r = el.getBoundingClientRect();
      return r.top + window.scrollY;
    };

    // --- Classify elements by which section they're likely in ---
    // Strategy: find key heading/block elements by text content and position,
    // then add reveal classes + observe with IntersectionObserver.

    const addReveal = (el, cls = 'cap-scroll-reveal', delay = '') => {
      el.classList.add(cls);
      if (delay) el.classList.add(delay);
    };

    // Observe and fire
    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('cap-revealed');
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });

    // SECTION HEADINGS — find large text nodes that are section titles
    const sectionHeadings = [...scaler.querySelectorAll('span, div')].filter(el => {
      const txt = (el.textContent || '').trim();
      const style = window.getComputedStyle(el);
      const fontSize = parseFloat(style.fontSize) || 0;
      return fontSize >= 40 && txt.length > 3 && txt.length < 60;
    });
    sectionHeadings.slice(0, 20).forEach((el, i) => {
      // Skip elements in the hero (visible on page load)
      const r = el.getBoundingClientRect();
      if (r.top < window.innerHeight) return;
      addReveal(el, 'cap-scroll-reveal');
      io.observe(el);
    });

    // STAT NUMBERS — large metric text ($500 Mn+, 135 Acres, 16 Assets, 75 Years+)
    const statNums = [...scaler.querySelectorAll('span, div')].filter(el => {
      const txt = (el.textContent || '').trim();
      return /^(\$?\d+\s*\w*[+]?)$/.test(txt) || txt.match(/^\d.*[+]$/);
    });
    statNums.forEach((el, i) => {
      const r = el.getBoundingClientRect();
      if (r.top < window.innerHeight) return;
      addReveal(el, 'cap-scale-reveal', 'cap-delay-' + Math.min(i + 1, 5));
      io.observe(el);
    });

    // BODY PARAGRAPHS — description text blocks
    const bodyParas = [...scaler.querySelectorAll('p, span')].filter(el => {
      const txt = (el.textContent || '').trim();
      const style = window.getComputedStyle(el);
      const fontSize = parseFloat(style.fontSize) || 0;
      return fontSize >= 16 && fontSize < 36 && txt.length > 40;
    });
    bodyParas.forEach((el, i) => {
      const r = el.getBoundingClientRect();
      if (r.top < window.innerHeight) return;
      addReveal(el, 'cap-scroll-reveal', 'cap-delay-' + (i % 3 + 1));
      io.observe(el);
    });

    this._scrollRevealIO = io;

    // Initialize Lenis Smooth Scroll & Sync GSAP Ticker
    if (window.Lenis && window.gsap && window.ScrollTrigger) {
      this._lenis = new window.Lenis({
        duration: 1.2,
        easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), // OCI style easing
      });
      this._lenis.on('scroll', window.ScrollTrigger.update);
      window.gsap.ticker.add((time) => {
        this._lenis.raf(time * 1000);
      });
      window.gsap.ticker.lagSmoothing(0);
    }

    this._setupHeroZoom();
    this._setupSplitText();

    // ===== MENU SMOOTH SCROLLING =====
    const navItems = [
      { text: 'ABOUT US', target: 900 },
      { text: 'PROJECTS', target: 3000 },
      { text: 'PORTFOLIO', target: 3000 },
      { text: 'TEAM', target: 6200 },
      { text: 'CONTACT US', target: 6942 }
    ];

    setTimeout(() => {
      navItems.forEach(item => {
        const els = [...scaler.querySelectorAll('span')].filter(el => 
          (el.textContent || '').replace(/\s+/g, '').toUpperCase() === item.text.replace(/\s+/g, '')
        );
        els.forEach(el => {
          el.style.cursor = 'pointer';
          el.addEventListener('click', () => {
            const vp = document.getElementById('cap-viewport');
            const target = item.target * ((vp ? vp.clientWidth : window.innerWidth) / 1440);
            if (this._lenis) {
              this._lenis.scrollTo(target);
            } else {
              window.scrollTo({ top: target, behavior: 'smooth' });
            }
          });
        });
      });
    }, 500);

    // ===== FOOTER EMAIL INPUT =====
    setTimeout(() => {
      const emailSpan = [...scaler.querySelectorAll('span')].find(el => 
        (el.textContent || '').trim() === 'Your Email Id'
      );
      if (emailSpan) {
        const input = document.createElement('input');
        input.type = 'email';
        input.placeholder = 'Your Email Id';
        input.style.position = 'absolute';
        input.style.left = emailSpan.style.left || '1124px';
        input.style.top = emailSpan.style.top || '345px';
        input.style.width = emailSpan.style.width || '180px';
        input.style.height = '35px';
        input.style.background = 'transparent';
        input.style.border = 'none';
        input.style.outline = 'none';
        input.style.fontFamily = emailSpan.style.fontFamily || 'Montserrat, sans-serif';
        input.style.fontSize = emailSpan.style.fontSize || '14px';
        input.style.fontWeight = emailSpan.style.fontWeight || '500';
        input.style.color = 'rgb(255,255,255)';
        input.style.borderBottom = '1px solid rgba(255,255,255,0.4)';
        
        emailSpan.parentNode.replaceChild(input, emailSpan);

        const arrowSvg = [...input.parentNode.querySelectorAll('svg')].find(s => 
          s.style.left === '1307px' || (parseFloat(s.style.left) >= 1300 && parseFloat(s.style.left) <= 1320)
        );
        if (arrowSvg) {
          arrowSvg.style.cursor = 'pointer';
          arrowSvg.addEventListener('click', () => {
            if (input.value) {
              alert(`Thank you for subscribing, ${input.value}!`);
              input.value = '';
            } else {
              alert('Please enter a valid email address.');
            }
          });
        }
      }
    }, 500);
  }

  _setupPreloader() {
    // --- OCI-style sequential loader ---
    document.body.style.overflow = 'hidden';

    // Full-screen red background
    const preloader = document.createElement('div');
    preloader.style.cssText =
      'position:fixed; inset:0; background:rgb(209,32,47); z-index:9999;' +
      'transition:transform 1.0s cubic-bezier(0.77,0,0.175,1);';
    document.body.appendChild(preloader);

    // Hide the actual header logo on page initially so we don't see double.
    // The wordmark lives in the async Figma bundle and can render AFTER the
    // preloader has already exited (slow/hard refresh) — in that case show it
    // immediately instead of hiding it forever.
    let preloaderFinished = false;
    const hideHeaderWordmark = () => {
      const el = document.querySelector('.fig-asset-7cb777f5a65019d1-0d894d80');
      if (!el) {
        setTimeout(hideHeaderWordmark, 50);
        return;
      }
      el.style.transition = 'opacity 0.25s ease';

      // Add logo icon to header and shift wordmark
      if (!document.getElementById('cap-header-logo-icon')) {
        const logoIcon = document.createElement('div');
        logoIcon.id = 'cap-header-logo-icon';
        logoIcon.style.cssText = 'position:absolute; left:32px; top:44px; width:34px; height:37px; background:url(./components/assets/eae7f9bdb03982f5.png) center/contain no-repeat; opacity:0; filter:brightness(0) invert(1); z-index:90;';
        el.parentNode.appendChild(logoIcon);
        el.style.left = '76px';
      }

      if (preloaderFinished) {
        el.style.opacity = '1';
        const icon = document.getElementById('cap-header-logo-icon');
        if (icon) icon.style.opacity = '1';
      } else {
        el.style.opacity = '0';
      }
    };
    hideHeaderWordmark();

    // --- Center logo content ---
    const centerWrap = document.createElement('div');
    centerWrap.style.cssText =
      'position:fixed; inset:0; z-index:10000; pointer-events:none;' +
      'display:flex; flex-direction:column; align-items:center; justify-content:center;';
    document.body.appendChild(centerWrap);

    const logoImg = document.createElement('img');
    logoImg.src = './components/assets/eae7f9bdb03982f5.png';
    logoImg.style.cssText =
      'width:90px; height:auto; opacity:0; transform:scale(0.7);' +
      'transition:transform 0.6s cubic-bezier(0.16,1,0.3,1), opacity 0.5s ease;' +
      'filter:brightness(0) invert(1);'; // Make it white on red
    centerWrap.appendChild(logoImg);

    const nameImg = document.createElement('img');
    nameImg.src = './components/assets/7cb777f5a65019d1.png';
    nameImg.style.cssText =
      'width:160px; height:auto; margin-top:18px; opacity:0;' +
      'transform:translateY(12px);' +
      'transition:transform 0.6s cubic-bezier(0.16,1,0.3,1), opacity 0.5s ease;' +
      'filter:brightness(0) invert(1);'; // White on red
    centerWrap.appendChild(nameImg);

    // === Sequential timing (no crosshair lines, no circles) ===
    // Step 1: Logo icon pops in (200ms)
    setTimeout(() => {
      logoImg.style.opacity = '1';
      logoImg.style.transform = 'scale(1)';
    }, 200);

    // Step 2: Name text slides up (400ms)
    setTimeout(() => {
      nameImg.style.opacity = '1';
      nameImg.style.transform = 'translateY(0)';
    }, 400);

    // Step 3: Exit — fly to navbar header wordmark while fading out logo and merging name (1100ms)
    setTimeout(() => {
      document.body.style.overflow = '';

      const vp = document.getElementById('cap-viewport');
      const s = vp ? vp.clientWidth / 1440 : 1;
      const hw = window.innerWidth / 2;
      const hh = window.innerHeight / 2;

      const headerWordmark = document.querySelector('.fig-asset-7cb777f5a65019d1-0d894d80');
      const logoIcon = document.getElementById('cap-header-logo-icon');
      
      let nameTx = 0, nameTy = 0, nameScale = 1;
      let logoTx = 0, logoTy = 0, logoScale = 1;

      if (headerWordmark && logoIcon) {
        const nameRect = nameImg.getBoundingClientRect();
        const wordmarkRect = headerWordmark.getBoundingClientRect();
        nameTx = wordmarkRect.left - nameRect.left;
        nameTy = wordmarkRect.top - nameRect.top;
        nameScale = wordmarkRect.width / nameRect.width;

        const logoRect = logoImg.getBoundingClientRect();
        const logoIconRect = logoIcon.getBoundingClientRect();
        logoTx = logoIconRect.left - logoRect.left;
        logoTy = logoIconRect.top - logoRect.top;
        logoScale = logoIconRect.height / logoRect.height;
      } else {
        // Fallback to absolute scale and coords if not loaded
        const targetX = 76 * s;
        const targetY = 44 * s;
        nameTx = -hw + targetX + 50 * s;
        nameTy = -hh + targetY + 16 * s;
        nameScale = 0.48 * s;

        const logoTargetX = 32 * s;
        logoTx = -hw + logoTargetX + 20 * s;
        logoTy = -hh + targetY + 16 * s;
        logoScale = 0.15 * s;
      }

      // CAPPELLA name flies toward navbar header wordmark
      nameImg.style.transition =
        'transform 0.85s cubic-bezier(0.77,0,0.175,1), opacity 0.65s ease';
      nameImg.style.transform = `translate(${nameTx}px, ${nameTy}px) scale(${nameScale})`;

      // Logo flies next to the wordmark and merges cleanly
      logoImg.style.transition =
        'transform 0.85s cubic-bezier(0.77,0,0.175,1), opacity 0.85s ease';
      logoImg.style.transform = `translate(${logoTx}px, ${logoTy}px) scale(${logoScale})`;
      logoImg.style.opacity = '1';

      // Red curtain slides off to top-left corner simultaneously
      preloader.style.transform = 'translate(-100%, -100%)';

      // Clean up and restore header logo opacity when preloader completes.
      // Re-query instead of using the refs captured at 1100ms — on slow loads
      // the wordmark renders late and those refs are null (the retry loop in
      // hideHeaderWordmark then handles showing it via preloaderFinished).
      setTimeout(() => {
        preloaderFinished = true;
        const wm = document.querySelector('.fig-asset-7cb777f5a65019d1-0d894d80');
        if (wm) wm.style.opacity = '1';
        const icon = document.getElementById('cap-header-logo-icon');
        if (icon) icon.style.opacity = '1';
        centerWrap.remove();
        preloader.remove();
      }, 950);
    }, 1100);
  }

  _setupHeroZoom() {
    // 4. Parallax Hero Zoom
    if (!window.gsap || !window.ScrollTrigger) return;
    const scaler = document.getElementById('cap-scaler');
    if (!scaler) return;
    
    const heroWrapper = [...scaler.querySelectorAll('div')].find(e => {
      const style = e.getAttribute('style') || '';
      return style.includes('width: 1440') && style.includes('height: 830.204');
    });

    if (heroWrapper) {
      heroWrapper.style.transformOrigin = '50% 100%'; // Zoom from bottom center slightly
      window.gsap.to(heroWrapper, {
        scale: 1.15,
        ease: "none",
        scrollTrigger: {
          trigger: document.body,
          start: "top top",
          end: "1200px", // Scroll distance
          scrub: true
        }
      });
    }
  }

  _setupSplitText() {
    // 5. Staggered Line-Split Quote Reveal
    if (!window.gsap || !window.ScrollTrigger || !window.SplitType) return;
    const scaler = document.getElementById('cap-scaler');
    if (!scaler) return;

    // Apply to main body paragraphs (the ones used for cap-scroll-reveal)
    const bodyParas = [...scaler.querySelectorAll('p, span')].filter(el => {
      const txt = (el.textContent || '').trim();
      const style = window.getComputedStyle(el);
      const fontSize = parseFloat(style.fontSize) || 0;
      return fontSize >= 16 && fontSize < 36 && txt.length > 40;
    });

    bodyParas.forEach((el) => {
      // Clean up previous classes to avoid conflicts
      el.classList.remove('cap-scroll-reveal');
      el.style.opacity = '1';
      el.style.transform = 'none';

      // Use SplitType to split text into lines
      const split = new window.SplitType(el, { types: 'lines' });
      
      // Wrap each line in an overflow hidden mask
      split.lines.forEach(line => {
        const wrapper = document.createElement('div');
        wrapper.style.overflow = 'hidden';
        wrapper.style.display = 'inline-block';
        wrapper.style.verticalAlign = 'top';
        wrapper.style.padding = '0';
        wrapper.style.margin = '0';
        line.parentNode.insertBefore(wrapper, line);
        wrapper.appendChild(line);
        // Initial state for GSAP
        window.gsap.set(line, { yPercent: 100 });
      });

      window.ScrollTrigger.create({
        trigger: el,
        start: "top 90%",
        onEnter: () => {
          window.gsap.to(split.lines, {
            yPercent: 0,
            duration: 1.2,
            ease: "power4.out",
            stagger: 0.08
          });
        }
      });
    });
  }

  _setupFooterAnimations() {
    const scaler = document.getElementById('cap-scaler');
    if (!scaler || this._footerAnimated) return;
    this._footerAnimated = true;
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const m = (scaler.style.transform || '').match(/scale\(([^)]+)\)/);
    const scale = m ? parseFloat(m[1]) : 1;
    const scalerRect = scaler.getBoundingClientRect();
    const frameBox = (el) => {
      const r = el.getBoundingClientRect();
      return { top: (r.top - scalerRect.top) / scale, left: (r.left - scalerRect.left) / scale,
               w: r.width / scale, h: r.height / scale };
    };
    const hasMatrix = (el) => ((el.getAttribute('style') || '').includes('matrix'));

    // ===== FOOTER REVEAL =====
    const footer = [...scaler.querySelectorAll('div')].find(d => d.getAttribute('data-original-top') === '7092');
    if (!footer) return;
    const footerTopFrame = parseFloat(footer.style.top) || 7092;

    // Live local-time line, OCI-editorial style
    const clock = document.createElement('div');
    clock.style.cssText =
      'position:absolute; left:1117px; top:' + (footerTopFrame + 26) + 'px; z-index:5;' +
      'font-family:"Space Mono", monospace; font-size:12px; letter-spacing:2px;' +
      'color:rgba(255,255,255,0.75); white-space:nowrap;';
    const tickClock = () => {
      clock.textContent = 'HYDERABAD \u2014 ' +
        new Date().toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour12: false }) + ' IST';
    };
    tickClock();
    this._clockIv = setInterval(tickClock, 1000);
    scaler.appendChild(clock);

    // Underline-wipe hover on footer links
    const linkTexts = ['ABOUT US', 'PORTFOLIO', 'TEAM', 'CONTACT US', 'LINKEDIN', 'PARTNER@CAPPELLA.IN'];
    [...footer.querySelectorAll('span')].forEach(sp => {
      const t = (sp.textContent || '').trim().toUpperCase();
      if (linkTexts.includes(t)) {
        sp.classList.add('cap-ft-link');
        sp.style.cursor = 'pointer';
      }
    });

    // Email input focus states + arrow nudge
    const emailInput = footer.querySelector('input[type="email"]');
    if (emailInput) {
      emailInput.style.transition = 'border-color 0.4s ease';
      emailInput.addEventListener('focus', () => { emailInput.style.borderBottom = '1px solid rgba(255,255,255,0.95)'; });
      emailInput.addEventListener('blur', () => { emailInput.style.borderBottom = '1px solid rgba(255,255,255,0.4)'; });
    }
    const arrow = [...footer.querySelectorAll('svg')].find(sv => {
      const l = parseFloat(sv.style.left);
      return l >= 1300 && l <= 1330;
    });
    if (arrow) {
      arrow.style.transition = 'transform 0.35s var(--cap-ease-power)';
      arrow.addEventListener('mouseenter', () => { arrow.style.transform = 'translateX(5px)'; });
      arrow.addEventListener('mouseleave', () => { arrow.style.transform = 'translateX(0)'; });
    }

    if (reduced) return;

    // Stage every footer element: big C logo wipes in, the rest rise
    // column-by-column (delay keyed to their position in the footer)
    const bigLogo = footer.querySelector('.fig-asset-c9d8f12cf6e90c99');
    const kids = [...footer.children].filter(el => {
      if (parseFloat(el.style.width) > 1400) return false; // red background slab
      return true;
    });
    const staged = [];
    kids.forEach(el => {
      const b = frameBox(el);
      const relTop = b.top - footerTopFrame;
      const delay = 0.15 + (b.left / 1440) * 0.4 + Math.max(0, relTop / 530) * 0.15;
      if (el === bigLogo) {
        el.style.clipPath = 'inset(0 100% 0 0)';
        el.style.transition = 'clip-path 1.1s var(--cap-ease-expo) 0.1s';
        staged.push(() => { el.style.clipPath = 'inset(0 0% 0 0)'; });
      } else {
        // opacity-only: the curtain scrub below owns the transform channel
        el.style.opacity = '0';
        el.style.transition = 'opacity 0.85s var(--cap-ease-expo) ' + delay + 's';
        staged.push(() => { el.style.opacity = '1'; });
      }
    });
    clock.style.opacity = '0';
    clock.style.transition = 'opacity 0.85s var(--cap-ease-expo) 0.5s';
    staged.push(() => { clock.style.opacity = '1'; });

    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        io.disconnect();
        staged.forEach(fn => fn());
      });
    }, { threshold: 0.25 });
    io.observe(footer);

    // ===== CURTAIN REVEAL =====
    // The footer container becomes a clipped window; its content is offset
    // one footer-height up and scrubs to rest as the window scrolls in, so
    // the footer reads as a fixed surface being uncovered by the page.
    if (window.gsap && window.ScrollTrigger) {
      footer.style.overflow = 'hidden';
      clock.style.zIndex = '6';
      // Capture slide targets AFTER the deferred footer-email setup (runs
      // ~500ms later) replaces the placeholder span with the real input —
      // otherwise the input is left out and stays static during the scrub
      setTimeout(() => {
        const slide = [...footer.children].filter(el => !(parseFloat(el.style.width) > 1400));
        // Part of the footer's content (email, address, designed-by, partner
        // logos) lives OUTSIDE the container in the Figma DOM — without them
        // the curtain shears the footer apart mid-scrub. adjustFooter tagged
        // everything in the footer region with data-original-top; take the
        // top-most tagged elements that aren't inside the container.
        const tagged = [...scaler.querySelectorAll('[data-original-top]')].filter(el => {
          if (el === footer || footer.contains(el)) return false;
          return parseFloat(el.getAttribute('data-original-top')) > 7092;
        });
        tagged.filter(el => !tagged.some(a => a !== el && a.contains(el)))
              .forEach(el => slide.push(el));
        slide.push(clock); // static clock would overlap sliding text mid-scrub
        window.gsap.fromTo(slide, { y: -420 }, {
          y: 0,
          ease: 'none',
          scrollTrigger: {
            trigger: footer,
            start: 'top bottom',
            end: 'bottom bottom',
            scrub: true
          }
        });
      }, 700);
    }
  }

  _setupOperatorsMarquee() {
    const scaler = document.getElementById('cap-scaler');
    if (!scaler || this._mqBuilt) return;
    this._mqBuilt = true;
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    // Operator logos (fig-asset background divs) measured from the frame
    const ROW_A = ['fig-asset-79356d431474ada0', 'fig-asset-91ee4f07ef1ea5a8',
                   'fig-asset-620dc3d6704178dd', 'fig-asset-1ec5ca333db94fc0'];
    const ROW_B = ['fig-asset-1e639ffbc0aca215', 'fig-asset-1462c629c4c2879d',
                   'fig-asset-55a8dd7666421f70-d65f9521'];
    const rowAEls = ROW_A.map(c => scaler.querySelector('.' + CSS.escape(c))).filter(Boolean);
    const rowBEls = ROW_B.map(c => scaler.querySelector('.' + CSS.escape(c))).filter(Boolean);
    if (rowAEls.length < 3 || rowBEls.length < 2) return; // frame changed — keep the grid

    // Hide the static grid + the triangle decorations woven between the rows
    [...rowAEls, ...rowBEls].forEach(el => { el.style.display = 'none'; });
    [...scaler.querySelectorAll('div')].forEach(el => {
      const st = el.getAttribute('style') || '';
      const top = parseFloat(el.style.top) || 0;
      if (top > 5560 && top < 6900 && st.includes('linear-gradient') && st.includes('209, 32, 47')) {
        el.style.display = 'none';
      }
    });

    // Build a marquee band: [row of cells]x(repeats), translated on rAF
    const rows = [];
    const buildBand = (els, top, dir) => {
      const band = document.createElement('div');
      band.style.cssText =
        'position:absolute; left:0; top:' + top + 'px; width:1440px; height:170px;' +
        'overflow:hidden; z-index:3; opacity:0; transition: opacity 1s var(--cap-ease-expo);';
      const track = document.createElement('div');
      track.style.cssText =
        'display:flex; align-items:center; height:100%; width:max-content;' +
        'will-change:transform;';
      const GAP = 150;
      const seqW = els.reduce((sum, el) => sum + (parseFloat(el.style.width) || 180) + GAP, 0);
      const repeats = Math.max(3, Math.ceil((1440 + seqW) / seqW) + 1);
      for (let rep = 0; rep < repeats; rep++) {
        els.forEach(el => {
          const cell = el.cloneNode(true);
          cell.style.display = 'block';
          cell.style.position = 'static';
          cell.style.left = 'auto';
          cell.style.top = 'auto';
          cell.style.transform = 'none';
          cell.style.margin = '0 ' + (GAP / 2) + 'px';
          cell.style.flex = '0 0 auto';
          cell.style.transition = 'transform 0.5s var(--cap-ease-expo)';
          cell.addEventListener('mouseenter', () => { cell.style.transform = 'translateY(-6px)'; });
          cell.addEventListener('mouseleave', () => { cell.style.transform = 'translateY(0)'; });
          track.appendChild(cell);
        });
      }
      band.appendChild(track);
      scaler.appendChild(band);
      const row = { band, track, seqW, dir, x: 0, speed: 0, targetSpeed: 34 };
      band.addEventListener('mouseenter', () => { row.targetSpeed = 0; });
      band.addEventListener('mouseleave', () => { row.targetSpeed = 34; });
      const io = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if (entry.isIntersecting) { band.style.opacity = '1'; io.disconnect(); } });
      }, { threshold: 0.3 });
      io.observe(band);
      rows.push(row);
    };
    buildBand(rowAEls, 5810, -1);
    buildBand(rowBEls, 6330, 1);

    // Shared drive loop — skips work while both bands are off-screen
    let lastT = performance.now();
    const step = (now) => {
      const dt = Math.min((now - lastT) / 1000, 0.05);
      lastT = now;
      let visible = false;
      rows.forEach(row => {
        const r = row.band.getBoundingClientRect();
        if (r.bottom < -100 || r.top > window.innerHeight + 100) return;
        visible = true;
        row.speed += (row.targetSpeed - row.speed) * 0.06; // eased pause/resume
        row.x = (row.x + row.dir * row.speed * dt) % row.seqW;
        const offset = row.dir === -1 ? row.x : row.x - row.seqW;
        row.track.style.transform = 'translateX(' + offset.toFixed(2) + 'px)';
      });
      this._mqRaf = requestAnimationFrame(step);
    };
    this._mqRaf = requestAnimationFrame(step);
  }

  _setupDitherEntries() {
    // OCI-style photo entries: the image sits as a red duotone Bayer dither
    // and resolves to full colour as it scrolls into view. Applied to the
    // journey backdrop and the journey building photo (the Edge image and
    // portfolio cards already have their own dither behaviours).
    const scaler = document.getElementById('cap-scaler');
    if (!scaler || this._ditherEntriesDone) return;
    this._ditherEntriesDone = true;
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    const TARGETS = [
      'fig-asset-9943ffc227529f04-36d3d657',  // journey full-width backdrop
      'fig-asset-531180345e372e44-3031d3f7'   // journey building photo
    ];
    const bayer = [[0,12,3,15],[8,4,11,7],[2,14,1,13],[10,6,9,5]];

    TARGETS.forEach(cls => {
      const el = scaler.querySelector('.' + CSS.escape(cls));
      if (!el) return;
      const bg = window.getComputedStyle(el).backgroundImage;
      if (!bg || bg === 'none') return;

      el.style.overflow = 'hidden';
      const canvas = document.createElement('canvas');
      canvas.style.cssText =
        'position:absolute; left:0; top:0; width:100%; height:100%;' +
        'pointer-events:none; opacity:0; transition: opacity 0.9s var(--cap-ease-power) 0.2s;';
      el.appendChild(canvas);

      const tempImg = new Image();
      tempImg.crossOrigin = 'anonymous';
      tempImg.src = bg.replace(/^url\(['"]?/, '').replace(/['"]?\)$/, '');
      tempImg.onload = () => {
        try {
          const w = 190, h = Math.round((tempImg.height / tempImg.width) * w);
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(tempImg, 0, 0, w, h);
          const imgData = ctx.getImageData(0, 0, w, h);
          const px = imgData.data;
          for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
              const i4 = (y * w + x) * 4;
              const gray = 0.299 * px[i4] + 0.587 * px[i4 + 1] + 0.114 * px[i4 + 2];
              const light = gray > ((bayer[y % 4][x % 4] + 0.5) / 16) * 255;
              px[i4] = light ? 255 : 209;
              px[i4 + 1] = light ? 235 : 32;
              px[i4 + 2] = light ? 235 : 47;
            }
          }
          ctx.putImageData(imgData, 0, 0);
        } catch (e) { canvas.remove(); return; }

        // Dithered until the photo scrolls in, then resolve to full colour
        canvas.style.transition = 'none';
        canvas.style.opacity = '1';
        void canvas.offsetHeight;
        canvas.style.transition = 'opacity 0.9s var(--cap-ease-power) 0.2s';
        const io = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (!entry.isIntersecting) return;
            io.disconnect();
            canvas.style.opacity = '0';
          });
        }, { threshold: 0.3 });
        io.observe(el);
      };
    });
  }
