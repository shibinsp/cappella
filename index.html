        try { fn(); } catch (e) { console.error('[cappella] ' + name + ' failed:', e); }
      };
      // Journey band FIRST: it opens the scroll gap (shifting everything
      // below) and mounts the pinned experience — later setups classify
      // from live (post-shift) positions.
      safe(() => this._setupJourneyBand(), 'journeyBand');
      safe(() => this._setupJourneyPinned(), 'journeyPinned');
      safe(() => this._setupScrollReveals(), 'scrollReveals');
      safe(() => this._setupStatCounters(), 'statCounters');
      safe(() => this._setupPortfolioInteraction(), 'portfolio');
      safe(() => this._setupAccordion(), 'accordion');
      // this._setupMetaLabels();
      safe(() => this._setupFooterAnimations(), 'footer');
      // (Operators marquee removed per client feedback 2026-07-16 — the
      // baked static logo grid + triangle decorations render as designed.)
      safe(() => this._setupOperatorsGridStitch(), 'operatorsStitch');
      safe(() => this._setupOperatorTriangles(), 'operatorTriangles');
      safe(() => this._setupBandGrid(), 'bandGrid');
      safe(() => this._setupEdgeImageCut(), 'edgeImageCut');
    }, 1600);

    // Hero intro: slight delay so first-frame paint is visible before elements vanish
    this._t4 = setTimeout(() => this._setupHeroIntro(), 200);
    this._t5 = setTimeout(() => this._setupHeroTitle(), 250);
  }

  _setupEdgeImageCut() {
    // Client: 45px gap below The Cappella Edge image, to match the white space
    // above it. The image ran flush into
    // the next section — its bottom sat at frame-y 3125 and the journey pin
    // starts at 3124.7, a 0.3px overlap. Trim the image instead of moving
    // anything, so every neighbour keeps its baked coordinates.
    const scaler = document.getElementById('cap-scaler');
    const img = scaler && scaler.querySelector('.fig-asset-63186349250e044c-069f3173');
    if (!img) {
      if ((this._eicTries = (this._eicTries || 0) + 1) < 40) setTimeout(() => this._setupEdgeImageCut(), 250);
      return;
    }
    const BAKED_H = 668, CUT = 45;
    // background-size's height is '100%' in fig-assets.css, i.e. the photo
    // stretches to whatever the box height is — shrinking the box alone would
    // squash it ~1.5% rather than cut it. Pin the photo to its baked height so
    // the shorter box CLIPS it, and anchor to the top (was 50%) so the whole
    // 10px comes off the bottom instead of 5px at each end.
    img.style.height = (BAKED_H - CUT) + 'px';
    img.style.backgroundSize = '147.178% ' + BAKED_H + 'px';
    img.style.backgroundPosition = '0.016% 0%';
  }

  _setupBandGrid() {
    // Client ("not fixed"): the stats band's rail grid must run the FULL
    // extended band. The baked vertical rails predate the +260 band
    // extension — they stop at ~2140, stranding 135 Acres / 75 Years+ and
    // the staircase outside the grid. Stretch both rails to the band
    // bottom (2675); scaleX composes with the hero draw-in transition, so
    // they simply draw further down. Also add the missing crossing dash
    // above 135 Acres (a clone of the baked AUM dash, same gray).
    const scaler = document.getElementById('cap-scaler');
    if (!scaler || this._bandGridDone) return;

    // Client 2026-07-22: drop the bright dot sitting on the rail crossing by
    // "16 Assets". It is a baked 88x88 div with a white-to-crimson radial
    // gradient — purely decorative, and the only radial-gradient in the whole
    // page, so the signature is an unambiguous selector. Hidden here rather
    // than edited out of components/, which is a generated Figma export.
    // Runs before the rails lookup below so an early return can't skip it.
    const glowDot = [...scaler.querySelectorAll('div')].find(el =>
      (el.style.background || el.style.backgroundImage || '').indexOf('radial-gradient') !== -1
    );
    if (glowDot) glowDot.style.display = 'none';

    const rails = [...scaler.querySelectorAll('svg')].filter(el =>
      /^matrix\(0,\s*1,\s*-1,\s*0,\s*(181|1078),\s*(830|888)\)/.test(el.style.transform || '')
    );
    const dash = [...scaler.querySelectorAll('svg')].find(el =>
      (el.style.transform || '').replace(/\s/g, '') === 'matrix(-1,0,0,-1,558,1793)'
    );
    if (rails.length < 2 || !dash) {
      if ((this._bgTries = (this._bgTries || 0) + 1) < 40) setTimeout(() => this._setupBandGrid(), 250);
      return;
    }
    this._bandGridDone = true;
    // 2415 = the extended band's true bottom (fill 1715 + 700). The earlier
    // 2675 double-counted the +260 extension and ran the x1078 rail through
    // "The Cappella Edge" heading below the band.
    const BAND_BOTTOM = 2415;
    rails.forEach(el => {
      const mm = /matrix\(0,\s*1,\s*-1,\s*0,\s*([\d.]+),\s*([\d.]+)\)/.exec(el.style.transform);
      const len = parseFloat(el.getAttribute('width')) || 1;
      const ty = parseFloat(mm[2]);
      el.style.transformOrigin = '0 0';
      el.style.transform =
        'matrix(0, 1, -1, 0, ' + mm[1] + ', ' + ty + ') scaleX(' + ((BAND_BOTTOM - ty) / len).toFixed(5) + ')';
      // Above the band-extension slab (z-4) — same layer as the stats (z-5);
      // without this the slab paints over everything below frame y 1715.
      el.style.zIndex = '5';
    });
    dash.style.zIndex = '5';
    const d2 = dash.cloneNode(true);
    d2.setAttribute('data-cap-own', '1');
    d2.style.transform = 'matrix(-1, 0, 0, -1, 558, 2078)';
    d2.style.zIndex = '5';
    dash.parentElement.appendChild(d2);

    // Client 2026-07-23 ("fix it", crop of the band/Edge boundary): the
    // Cappella Edge photo/accordion divider is baked at ty 2150 — 8px under
    // shiftBelowBand's 2158 threshold, so it missed the +260 band extension
    // while the section content moved. Its stranded top started inside the
    // red band and poked through the band's white staircase notch. In the
    // baked design the divider MEETS the band's bottom edge (2150 ≈ old
    // band bottom 2155) and runs down into the section as one continuous
    // line — client confirmed that join must stay. Re-anchor the top to
    // the extended band's bottom (2415, same constant as the rails above)
    // and keep the bottom at the section end (2150 + 980 = 3130).
    // Absolute values — this block can re-run on hydration retries and
    // must not compound.
    const edgeDivider = [...scaler.querySelectorAll('svg')].find(el =>
      /^matrix\(0,\s*1,\s*-1,\s*0,\s*723,\s*2150\)/.test(el.style.transform || '')
    );
    if (edgeDivider) {
      edgeDivider.style.transformOrigin = '0 0';
      edgeDivider.style.transform = 'matrix(0, 1, -1, 0, 723, ' + BAND_BOTTOM + ')';
      edgeDivider.style.width = (3130 - BAND_BOTTOM) + 'px';
      edgeDivider.setAttribute('width', String(3130 - BAND_BOTTOM));
      // BAND_BOTTOM is already the post-shift coordinate — mark it so the
      // next shiftBelowBand pass doesn't add the +260 extension on top
      // (it re-shifted this to +260 before this marker was set).
      edgeDivider.setAttribute('data-cap-shifted', '1');
    }
  }

  _setupOperatorsGridStitch() {
    // Client feedback: the Lighthouse logo floats free of the operators
    // hairline grid (the baked design gives every other logo a crossing
    // line) and sits slightly off the grid axes. Stitch it in:
    //  - a design-matching hairline across its row, spanning the section's
    //    two verticals (x 448 → 1019), rendered behind the logos exactly
    //    like Saint Mary's own dash
    //  - align the logo to ISP's column axis and Saint Mary's row axis
    // The hairline is injected with PRE-SHIFT coordinates and no
    // data-cap-own, so the band shift (+260) and journey delta adopt it
    // like any baked frame element — correct on every viewport and resize.
    const scaler = document.getElementById('cap-scaler');
    // The segments must live INSIDE the imported frame subtree: both
    // shiftBelowBand and shiftJourney only walk frameRoot, so a scaler-
    // level child would never be shifted into place.
    const frameRoot = scaler && scaler.querySelector('[class*="sc-host"]');
    const lh = scaler && scaler.querySelector('.fig-asset-55a8dd7666421f70-d65f9521');
    const sm = scaler && scaler.querySelector('.fig-asset-1ec5ca333db94fc0');
    const isp = scaler && scaler.querySelector('.fig-asset-620dc3d6704178dd');
    if (!lh || !sm || !isp || !frameRoot) {
      if ((this._osTries = (this._osTries || 0) + 1) < 40) setTimeout(() => this._setupOperatorsGridStitch(), 250);
      return;
    }
    if (this._opStitchDone) return;
    this._opStitchDone = true;

    // JGI's logo is a transparent circular PNG, so the x1026 grid vertical
    // showed through it (the rectangular logos mask crossing lines with
    // their own white boxes). A white backing makes it mask the line the
    // same way — invisible against the section's white page.
    const jgi = scaler.querySelector('.fig-asset-79356d431474ada0');
    if (jgi) jgi.style.backgroundColor = '#fff';

    // Row axis = Saint Mary's vertical centre, in the post-band-shift
    // domain the journey bookkeeping stores (jorig = baked + 260).
    const jorigOf = (el) => parseFloat(el.getAttribute('data-jorig-top') || el.style.top) || 0;
    const smCenter = jorigOf(sm) + (parseFloat(sm.style.height) || 0) / 2;

    // Align Lighthouse: row axis via jorig (the journey shift re-derives
    // style.top from it on every pass), column axis via left (untouched by
    // the shift machinery).
    const lhH = parseFloat(lh.style.height) || 0;
    lh.setAttribute('data-jorig-top', String(smCenter - lhH / 2));
    const ispCenter = (parseFloat(isp.style.left) || 0) + (parseFloat(isp.style.width) || 0) / 2;
    lh.style.left = (ispCenter - (parseFloat(lh.style.width) || 0) / 2) + 'px';

    // (The crossing hairline previously injected at this row was removed
    // 2026-07-17: the Figma design has no horizontal line at the Lighthouse
    // row — the grid verticals simply end/gap around it.)

    // Center-column vertical (Figma): runs down the x726 column, gapping
    // around the LIGHTHOUSE wordmark, then continuing to the footer band.
    // The baked element for it (the hidden 1581-long svg) got stranded at
    // the wrong span by the band/journey shifts — rebuild it as two clones
    // positioned from live geometry, adopted by the shift machinery via
    // data-jorig-ty (+ data-cap-shifted so shiftBelowBand won't re-shift).
    const donor = scaler.querySelector('svg[width="1581"]');
    if (donor && !scaler.querySelector('[data-cap-centerline]')) {
      const srect = scaler.getBoundingClientRect();
      const mSc = (scaler.style.transform || '').match(/scale\(([^)]+)\)/);
      const sc2 = mSc ? parseFloat(mSc[1]) : 1;
      const cvTop = (el) => (el.getBoundingClientRect().top - srect.top) / sc2;
      const cvBottom = (el) => (el.getBoundingClientRect().bottom - srect.top) / sc2;
      const band = scaler.querySelector('[data-original-top="7352"]');
      const jd = this._jDelta || 0;
      const mkSeg = (topY, bottomY) => {
        const len = bottomY - topY;
        if (len <= 10) return;
        const el = donor.cloneNode(true);
        el.setAttribute('data-cap-centerline', '1');
        el.setAttribute('data-cap-shifted', '1');
        el.setAttribute('data-jorig-ty', String(bottomY - jd));
        el.style.display = '';
        el.style.transform = 'matrix(0, -1, 1, 0, 726, ' + bottomY.toFixed(1) + ') scaleX(' + (len / 1581).toFixed(5) + ')';
        donor.parentElement.appendChild(el);
      };
      if (band) {
        mkSeg(cvBottom(isp) + 18, cvTop(lh) - 18);
        mkSeg(cvBottom(lh) + 18, cvTop(band));
      }
    }
    if (this._runAdjust) this._runAdjust();
  }

  _setupOperatorTriangles() {
    // Client 2026-07-21: the red wedges in the operators grid were replicated
    // from Figma as static decoration, but in the design they are an
    // ANIMATION — a wedge should arrive on the cell whose logo you point at.
    // So: hide the three baked static wedges, and wipe one in on hover.
    //
    // Decorative and cursor-driven, so it hard-bails on touch and under
    // reduced motion (same guards as _setupDotGrid / _setupMagneticBtn).
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    if (!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;

    const scaler = document.getElementById('cap-scaler');
    const frameRoot = scaler && scaler.querySelector('[class*="sc-host"]');

    // One entry per logo. dx/dy place the wedge's solid red TIP relative to
    // that logo's own top-left, because the anchor is appended as a CHILD of
    // the logo: it then rides along with every shift (+260 band, journey
    // delta) for free, with no data-jorig bookkeeping to keep in sync. That
    // matters more than it sounds — this section's rendered y moves between
    // loads (the journey delta is derived from viewport height), so absolute
    // coordinates measured in one session are wrong in the next.
    //
    // `fan` picks the matrix form — which way the wedge opens out from its
    // tip — and the trailing comment says where that puts it relative to its
    // logo. Those are two different things: Saint Mary's wedge sits BELOW its
    // logo while still fanning up-right, so naming the field after the side
    // would be a lie.
    //
    // Client 2026-07-21: mirrored by column so the wedges point inward — the
    // two left columns (x178, x451) sit to the right of their logo, the two
    // right columns (x726, x1026) to the left.
    //
    // Tips sit on a column axis where a horizontal rule crosses it, so the
    // wedge's flat edge rests on that rule. CRIMSON/ISP share the (451, 9446)
    // intersection and MERAKI/TSUS share (726, 9818), fanning opposite ways —
    // safe, because each wedge is bound to its own logo's hover and they can
    // never be on screen together.
    const CELLS = [
      { asset: 'fig-asset-91ee4f07ef1ea5a8', fan: 'upLeft',  dx: 358, dy: 56 },   // CRIMSON — right of logo, tip (451, 9446)
      { asset: 'fig-asset-1e639ffbc0aca215', fan: 'upLeft',  dx: 381, dy: 44 },   // MERAKI  — right of logo, tip (726, 9818)

      // Client 2026-07-23: ISP's wedge should read as CRIMSON's mirror image
      // (they share the same rail intersection). upRight is a 90-degree
      // ROTATION — its fade runs at a visibly different angle — so ISP gets
      // the dedicated mirrored form instead.
      { asset: 'fig-asset-620dc3d6704178dd', fan: 'upRightMirror', dx: -140, dy: 73 },  // ISP — left of logo, tip (451, 9446)
      // Client 2026-07-23: TSUS mirrors MERAKI across their shared rail, same
      // treatment as the ISP/CRIMSON pair below.
      { asset: 'fig-asset-1462c629c4c2879d', fan: 'upRightMirror', dx: -157, dy: 47 },  // TSUS — left of logo, tip (726, 9818)

      // Client 2026-07-22: Saint Mary's wedge belongs in the cell BELOW the
      // logo. (1026, 9261) is the x1026 vertical crossing the y9261 rule —
      // exactly where baked wedge A sat. Client 2026-07-23: switched from
      // wedge A's rotated up-right form to the mirror form, so its fade angle
      // matches the upLeft wedges like the rest of the mirrored set.
      { asset: 'fig-asset-1ec5ca333db94fc0', fan: 'upRightMirror', dx: 84, dy: 255 },   // SAINT MARY'S — below logo, tip (1026, 9261)

      // No rule crosses beside these two, so their wedges sit further out than
      // the rest, and Lighthouse's has no rule under its flat edge at all —
      // the Figma design deliberately has no horizontal on that row, see the
      // note in _setupOperatorsGridStitch. Flagged to the client, not fudged.
      //
      // Client 2026-07-23: JGI joins the mirror set with the others — same
      // footprint left of its logo, fade angle symmetric with the upLeft
      // wedges. (It was briefly flipped upLeft across the rail to match
      // Figma's "Rectangle 126", then reverted the same day — the complaint
      // was fade quality, not which side of the rail it sits on.)
      { asset: 'fig-asset-79356d431474ada0', fan: 'upRightMirror', dx: -226, dy: 70 },  // JGI — left of logo, tip (726, 9169)
      { asset: 'fig-asset-55a8dd7666421f70-d65f9521', fan: 'upRightMirror', dx: -170, dy: 18 } // LIGHTHOUSE — left of logo, tip (451, 10062)
    ];

    const found = CELLS.map(c => ({ c, el: frameRoot && frameRoot.querySelector('.' + c.asset) }));
    if (!frameRoot || found.some(f => !f.el)) {
      if ((this._otTries = (this._otTries || 0) + 1) < 40) setTimeout(() => this._setupOperatorTriangles(), 250);
      return;
    }
    if (this._opTriDone) return;
    this._opTriDone = true;

    // The three baked wedges are the static version being replaced. They are
    // the only elements in the frame carrying this gradient, so the signature
    // is a safe selector.
    const GRAD_SIG = 'linear-gradient(153.033deg';
    [...frameRoot.querySelectorAll('div')].forEach(el => {
      const bg = el.style.background || el.style.backgroundImage || '';
      if (bg.indexOf(GRAD_SIG) !== -1) el.style.display = 'none';
    });

    // Client 2026-07-23: the baked two-stop gradient read as a solid
    // hard-edged triangle next to the Figma render ("the fade is
    // incomplete"). Same stops, different interpolation: CSS ramps the two
    // stops LINEARLY, while Figma renders them as an ease-out decay — half
    // gone by 14% of the gradient line, a long feathered tail after. These
    // intermediate stops are the Figma render's measured redness profile
    // (sampled along the reference PNG's diagonal at 5% steps), so the CSS
    // piecewise-linear ramp traces Figma's curve. Alpha-only stops on the
    // constant brand red: over the white page redness is proportional to
    // alpha, so measured redness maps 1:1 onto these values.
    const GRAD = 'linear-gradient(153.033deg, rgb(209,32,47) 1.96%, ' +
                 'rgba(209,32,47,0.82) 5%, rgba(209,32,47,0.62) 10%, ' +
                 'rgba(209,32,47,0.44) 15%, rgba(209,32,47,0.29) 20%, ' +
                 'rgba(209,32,47,0.17) 25%, rgba(209,32,47,0.085) 30%, ' +
                 'rgba(209,32,47,0.03) 36%, rgba(209,32,47,0) 42.23%, ' +
                 'rgba(255,255,255,0) 78.20%)';
    const SHOWN = 'inset(0 0 0 0)';

    // Both matrices are lifted from the baked wedges: -1,0,0,-1 is the form
    // wedges B and C use (fans up-and-left), 0,-1,1,0 is the form wedge A
    // uses (fans up-and-right). In both the translate IS the red tip.
    //
    // The clip has to flip with the matrix or the wedge wipes in from its far
    // edge instead of growing out of the tip. Under -1,0,0,-1 local +x maps to
    // screen -x, so clipping from local right reveals the tip first. Under
    // 0,-1,1,0 local +y maps to screen +x, so the equivalent is clipping from
    // local bottom.
    const FORM = {
      upLeft:  { matrix: 'matrix(-1, 0, 0, -1, ', hidden: 'inset(0 100% 0 0)' },
      upRight: { matrix: 'matrix(0, -1, 1, 0, ',  hidden: 'inset(0 0 100% 0)' },
      // 1,0,0,-1 is a vertical flip: the exact horizontal mirror of the
      // upLeft wedge, opening right of its tip. Unlike upRight (a rotation,
      // whose fade runs at a rotated angle), this keeps the fade angle
      // symmetric with upLeft across the shared rail. Local +x stays screen
      // +x, so hiding from local right reveals out of the tip, like upLeft.
      upRightMirror: { matrix: 'matrix(1, 0, 0, -1, ', hidden: 'inset(0 100% 0 0)' }
    };

    found.forEach(({ c, el }) => {
      const form = FORM[c.fan] || FORM.upLeft;

      const anchor = document.createElement('div');
      anchor.setAttribute('data-cap-own', '1');
      anchor.style.cssText =
        'position:absolute; left:0; top:0; transform-origin:0 0;' +
        'z-index:5; pointer-events:none;';
      anchor.style.transform = form.matrix + c.dx + ', ' + c.dy + ')';

      // Inner element carries the paint and the reveal, so the animation
      // never fights the positioning matrix. Clipping from the tip outward is
      // what makes it read as being drawn along the rule it sits on.
      // Client 2026-07-23: "small missing fade" — the gradient's zero-line
      // exits the 118.5px box geometrically (it would reach zero at ~149px),
      // so ~5% red was still present at the box's far edge and cut off as a
      // hard vertical line. The Figma render completes its fade exactly at
      // the box corner. Feather the far edge (local x=W — the cut edge for
      // both live forms: screen-left for upLeft, screen-right for the
      // mirror) with a mask so the tail fades out inside the box instead of
      // clipping. The tip edge (local x=0, resting on the rail) stays crisp.
      const EDGE_FEATHER = 'linear-gradient(90deg, #000 80%, rgba(0,0,0,0) 100%)';
      const ink = document.createElement('div');
      ink.style.cssText =
        'width:118.514px; height:119.995px; transform-origin:0 0;' +
        'clip-path:' + form.hidden + ';' +
        'transition: clip-path 0.42s cubic-bezier(0.16, 1, 0.3, 1);' +
        '-webkit-mask-image:' + EDGE_FEATHER + ';' +
        'mask-image:' + EDGE_FEATHER + ';' +
        'background:' + GRAD + ';';
      anchor.appendChild(ink);
      el.appendChild(anchor);

      // Client 2026-07-23: "the animation is not complete." Two causes, both
      // from the hitbox being only the logo's own small box while the wedge
      // paints OUTSIDE it (dx up to ±358): (a) drifting the cursor toward the
      // appearing wedge fired mouseleave and reversed the wipe mid-flight;
      // (b) sweeping across a shallow logo never left the wipe time to run.
      //
      // Fix 1 — hover pad: an invisible hitbox spanning logo ∪ wedge box, so
      // pointing anywhere in the cell keeps the wedge alive. Child of the
      // logo like the anchor, for the same shift-riding reason. Pads never
      // overlap a neighbouring logo: adjacent cells only touch at the shared
      // column axes (CRIMSON|ISP at x451, MERAKI|TSUS at x726).
      const W = 118.514, H = 119.995;
      const wedgeBox = c.fan === 'upRight'
        ? { x0: c.dx,     x1: c.dx + H, y0: c.dy - W, y1: c.dy }   // matrix(0,-1,1,0): local h lies along screen x
        : c.fan === 'upRightMirror'
        ? { x0: c.dx,     x1: c.dx + W, y0: c.dy - H, y1: c.dy }   // matrix(1,0,0,-1): box up-right of tip
        : { x0: c.dx - W, x1: c.dx,     y0: c.dy - H, y1: c.dy };  // matrix(-1,0,0,-1): box up-left of tip
      const padX = Math.min(0, wedgeBox.x0);
      const padY = Math.min(0, wedgeBox.y0);
      const pad = document.createElement('div');
      pad.setAttribute('data-cap-own', '1');
      pad.style.cssText =
        'position:absolute;' +
        'left:' + padX + 'px; top:' + padY + 'px;' +
        'width:' + (Math.max(parseFloat(el.style.width) || 0, wedgeBox.x1) - padX) + 'px;' +
        'height:' + (Math.max(parseFloat(el.style.height) || 0, wedgeBox.y1) - padY) + 'px;' +
        'z-index:4; pointer-events:auto; background:transparent;';
      el.appendChild(pad);

      // Fix 2 — linger: retract only after the 0.42s wipe has had time to
      // finish, so even a fast sweep shows the complete wedge. Re-entering
      // during the linger cancels the retract.
      let hideT = null;
      pad.addEventListener('mouseenter', () => {
        clearTimeout(hideT);
        ink.style.clipPath = SHOWN;
      });
      pad.addEventListener('mouseleave', () => {
        clearTimeout(hideT);
        hideT = setTimeout(() => { ink.style.clipPath = form.hidden; }, 450);
      });
    });
  }

  _setupDotGrid() {
    // Same guards as _setupMagneticBtn: this is a cursor affordance, so it is
    // pointless on touch and unwanted under reduced motion. Bailing here also
    // skips allocating the 250k-dot buffers on phones. The canvas carries
    // opacity:0 inline, so bailing leaves nothing visible.
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    if (!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;
    const canvas = document.getElementById('cap-dotgrid');
    if (!canvas) { if ((this._dgTries = (this._dgTries || 0) + 1) < 40) setTimeout(() => this._setupDotGrid(), 200); return; }
    const ctx = canvas.getContext('2d');

    // The baked band stats are z-auto, and the frame root creates no stacking
    // context (verified: #cap-scaler's transform is the only one), so they
    // compete directly with this scaler-level canvas at z-4 and would end up
    // UNDER it. Lift them to the stats layer exactly as _setupBandGrid does
    // for the rails. Matched by coordinate — the same idiom _setupStatCounters
    // uses — and never retained, since _setupStatCounters rewrites their
    // innerHTML for the odometer roll. Idempotent; retried because the frame
    // hydrates async.
    const liftStats = () => {
      const scaler = document.getElementById('cap-scaler');
      if (!scaler) return false;
      // $500 Mn+ wrapper, 16 Assets, its label, and the tagline (the tagline
      // is not a hotspot, but lifting it keeps a later radius change safe).
      const want = [[222, 1163], [695, 1603], [755, 1678], [647, 914]];
      let hit = 0;
      for (const el of scaler.querySelectorAll('div, span')) {
        const l = parseFloat(el.style.left), t = parseFloat(el.style.top);
        if (want.some(([wl, wt]) => l === wl && t === wt)) { el.style.zIndex = '5'; hit++; }
      }
      return hit >= want.length;
    };
    const tryLift = () => {
      if (liftStats()) return;
      if ((this._dgLiftTries = (this._dgLiftTries || 0) + 1) < 40) setTimeout(tryLift, 250);
    };
    tryLift();

    // H spans the full red band (frame y 830-2415). This one constant also
    // drives the ny/cy bounds checks in onMove/onClick below.
    const W = 1440, H = 1585, dotSize = 1.4, gap = 1.6, cell = dotSize + gap;
    const baseA = 0.16, activeA = 0.95;
    const cols = Math.floor((W + gap) / cell), rows = Math.floor((H + gap) / cell);
    const gridW = cell * cols - gap, gridH = cell * rows - gap;
    const sx = (W - gridW) / 2 + dotSize / 2, sy = (H - gridH) / 2 + dotSize / 2;
    // Typed offsets instead of ~250k objects (~30MB + GC pressure). Every
    // other per-dot value (cx, cy and the three ambient phases) is linear in
    // row/col, so it is cheaper to recompute inline than to store and load.
    const N = cols * rows;
    const OX = new Float32Array(N), OY = new Float32Array(N);
    // Pixel-buffer renderer: a quarter-million fillRect calls per frame run at
    // slideshow speed; writing pixels into one ImageData and blitting only the
    // dirty rect is ~60fps.
    canvas.width = W; canvas.height = H;
    const frame = ctx.createImageData(W, H);
    const px32 = new Uint32Array(frame.data.buffer);
    // sine lookup table — 3 trig calls x 130k dots per frame is the other hotspot
    const SIN_N = 4096, SIN_MASK = SIN_N - 1, SIN_K = SIN_N / (Math.PI * 2);
    const SIN = new Float32Array(SIN_N);
    for (let i = 0; i < SIN_N; i++) SIN[i] = Math.sin((i / SIN_N) * Math.PI * 2);
    const fsin = (v) => SIN[((v * SIN_K) | 0) & SIN_MASK];
    const fcos = (v) => SIN[(((v * SIN_K) | 0) + SIN_N / 4) & SIN_MASK];

    // ===== WATER-FLOW CURSOR FIELD =====
    // No impulse kicks: every frame each dot eases toward a continuous target
    // displacement (surface bulge + directional drag + ripple rings), which is
    // what makes the response read as fluid instead of twitchy.
    const P = { x: -9999, y: -9999, lastX: 0, lastY: 0, lastT: 0, vx: 0, vy: 0 };
    let smoothX = -9999, smoothY = -9999;
    let sVX = 0, sVY = 0;              // smoothed cursor velocity (the wake direction)
    const R = 150, R2 = R * R;         // cursor influence radius
    const MASK_R = R + 56;             // == the cull box half-size; alpha must reach 0 here
    const BULGE = 16;                  // how far the surface parts around the cursor
    const rings = [];                  // expanding click/wake ripples
    let lastWake = 0;
    let isMoving = false;
    let cursorGlow = 0;
    let dgIdleTimeout = null;

    // ===== STAT HOTSPOTS =====
    // The field only wakes near the four stat figures; everywhere else in the
    // band it stays at hard zero. Rects are canvas-local (frame y - 830) and
    // hardcoded on purpose: the band's position is static (above both
    // CAP_SHIFT_FROM and JBAND_TOP) and _fit's uniform scale is already
    // divided out in onMove, so there is nothing to measure and nothing to
    // recompute on resize. Hardcoding is also immune to _setupStatCounters
    // rewriting the stat innerHTML for the odometer roll.
    // (The baked "10 Years" at 695,2115 is hidden at runtime — not a hotspot.)
    const BAND_TOP = 830;
    const HOT = [
      { x0: 222, y0: 1163 - BAND_TOP, x1: 715,  y1: 1285 - BAND_TOP }, // $500 Mn+ / AUM
      { x0: 695, y0: 1603 - BAND_TOP, x1: 1067, y1: 1703 - BAND_TOP }, // 16 Assets + label
      { x0: 214, y0: 1835 - BAND_TOP, x1: 520,  y1: 1935 - BAND_TOP }, // #cap-135
      { x0: 695, y0: 2138 - BAND_TOP, x1: 1000, y1: 2238 - BAND_TOP }, // #cap-75
    ];
    const HOT_IN = 40, HOT_OUT = 230;  // full glow within 40px of a rect, zero past 230
    // Distance to the nearest rect EDGE, not its centre: the $500 Mn+ block is
    // 493px wide, so a centre-distance falloff would leave its ends dead.
    const hotFactor = (x, y) => {
      let best = Infinity;
      for (const h of HOT) {
        const dx = x < h.x0 ? h.x0 - x : (x > h.x1 ? x - h.x1 : 0);
        const dy = y < h.y0 ? h.y0 - y : (y > h.y1 ? y - h.y1 : 0);
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < best) { best = d; if (best === 0) break; }
      }
      if (best >= HOT_OUT) return 0;
      if (best <= HOT_IN) return 1;
      const t = 1 - (best - HOT_IN) / (HOT_OUT - HOT_IN);
      return t * t * (3 - 2 * t);      // smoothstep, matching the cursor falloff below
    };
    let clickGlow = 0;                 // proximity captured at click, holds while rings live

    const sc = () => { const e = document.getElementById('cap-scaler'); const m = (e.style.transform || '').match(/scale\(([^)]+)\)/); return m ? parseFloat(m[1]) : 1; };
    const onMove = (e) => {
      const s = sc(), r = canvas.getBoundingClientRect(), now = performance.now(), dt = P.lastT ? Math.max(now - P.lastT, 1) : 16;
      const nx = (e.clientX - r.left) / s, ny = (e.clientY - r.top) / s;
      P.vx = (nx - P.lastX) / dt * 1000; P.vy = (ny - P.lastY) / dt * 1000;
      P.lastX = nx; P.lastY = ny; P.lastT = now; P.x = nx; P.y = ny;
      
      isMoving = true;
      clearTimeout(dgIdleTimeout);
      dgIdleTimeout = setTimeout(() => {
        isMoving = false;
      }, 250); // 250ms idle threshold

      // fast strokes shed small wake ripples behind the cursor, like a hand
      // through water. Gated on proximity too: a stroke across dead band space
      // would otherwise queue rings that are invisible but still keep the
      // draw loop's early-out from firing.
      const speed = Math.hypot(P.vx, P.vy);
      if (speed > 550 && now - lastWake > 110 && ny > -50 && ny < H + 50 && hotFactor(nx, ny) > 0) {
        lastWake = now;
        rings.push({ x: nx, y: ny, r: 10, speed: 3.2, amp: 7, sigma: 22 });
      }
    };
    const onClick = (e) => {
      const s = sc(), r = canvas.getBoundingClientRect();
      const cx = (e.clientX - r.left) / s, cy = (e.clientY - r.top) / s;
      if (cy < -50 || cy > H + 50) return;
      const f = hotFactor(cx, cy);
      if (f <= 0) return;              // outside every stat: stays invisible
      // Hold the glow up for as long as the ripple lives. Without this the
      // 250ms idle timer drops isMoving and the field fades out from under
      // a still-expanding ripple whenever you click without moving.
      clickGlow = f;
      // a dropped-stone ripple: main crest + a softer follower
      rings.push({ x: cx, y: cy, r: 6, speed: 5.2, amp: 22, sigma: 30 });
      rings.push({ x: cx, y: cy, r: -34, speed: 5.2, amp: 12, sigma: 24 });
    };
    const onLeave = () => { P.x = -9999; P.y = -9999; isMoving = false; };
    window.addEventListener('mousemove', onMove, { passive: true });
    window.addEventListener('mouseleave', onLeave);
    window.addEventListener('click', onClick);

    const draw = () => {
      // Band off-screen -> skip all physics/painting, just idle the loop
      const rect = canvas.getBoundingClientRect();
      if (rect.bottom < 0 || rect.top > window.innerHeight) {
        this._dgRaf = requestAnimationFrame(draw);
        return;
      }

      // Spring-smoothed cursor position (organic tracking)
      if (P.x > -9000) {
        if (smoothX < -9000) { smoothX = P.x; smoothY = P.y; this._dgVX = 0; this._dgVY = 0; }
        if (!this._dgVX) { this._dgVX = 0; this._dgVY = 0; }
        this._dgVX += (P.x - smoothX) * 0.07; this._dgVY += (P.y - smoothY) * 0.07;
        this._dgVX *= 0.78; this._dgVY *= 0.78;
        smoothX += this._dgVX; smoothY += this._dgVY;
      } else { smoothX = -9999; smoothY = -9999; }
      
      // Smoothly update cursorGlow multiplier (fast fade in, slow decay on
      // idle), now gated by distance to the nearest stat. NOTE: no
      // canvas.style.opacity write — an inline style on a #cap-scaler
      // descendant every frame wakes the layout MutationObserver, which
      // costs a full adjustFooter()+_fit() pass on every mouse stop. The glow
      // is folded into per-dot alpha at the pixel write instead; identical
      // result, because the 3px dot pitch means dots never overlap.
      const prox = (P.x > -9000) ? hotFactor(P.x, P.y) : 0;
      const targetGlow = Math.max(
        (isMoving && P.x > -9000) ? prox : 0,
        rings.length ? clickGlow : 0
      );
      cursorGlow += (targetGlow - cursorGlow) * (isMoving ? 0.12 : 0.06);

      // Smoothed velocity — decays gently so the wake trails and settles
      sVX += (((P.x > -9000) ? P.vx : 0) - sVX) * 0.06;
      sVY += (((P.x > -9000) ? P.vy : 0) - sVY) * 0.06;
      const dragX = Math.max(-30, Math.min(30, sVX * 0.022));
      const dragY = Math.max(-30, Math.min(30, sVY * 0.022));

      // Advance ripples. Hard radius cap (rather than the canvas diagonal)
      // keeps the dirty box below from degenerating to the full canvas: at
      // r=340 a click ripple's amp has already decayed to ~1.8, i.e. invisible.
      for (let i = rings.length - 1; i >= 0; i--) {
        const g = rings[i];
        g.r += g.speed;
        g.amp *= 0.962;
        if (g.amp < 0.35 || g.r > 340) rings.splice(i, 1);
      }
      if (!rings.length) clickGlow = 0;

      // ===== IDLE EARLY-OUT =====
      // Away from the stats the field is fully transparent, so there is no
      // reason to run physics or paint. This is what pays for the band being
      // ~2x the hero's height: at rest the loop does nothing at all.
      if (cursorGlow < 0.004 && !rings.length) {
        if (this._dgWasActive) {
          // Final clear+blit so no residue is stranded on screen, and relax
          // every offset — the culled loop below only touches dots near the
          // cursor, so dots left behind would otherwise stay displaced and
          // snap on re-entry.
          // FULL clear+blit, deliberately not the dirty rect: edge dots can
          // land a pixel or two outside the recorded box (ambient shimmer
          // offsets them after the box is computed), and a dirty blit would
          // strand those. Runs once per deactivation, so cost is irrelevant —
          // and it guarantees the resting canvas is exactly empty.
          px32.fill(0);
          ctx.putImageData(frame, 0, 0);
          this._dgDX = this._dgDY = this._dgDW = this._dgDH = null;
          OX.fill(0); OY.fill(0);
          this._dgWasActive = false;
        }
        this._dgRaf = requestAnimationFrame(draw);
        return;
      }
      this._dgWasActive = true;
      const T = (this._dgT = (this._dgT || 0) + 0.025); // ambient water time

      // ===== DIRTY BOX =====
      // Union of the cursor's influence disc and every live ring, in canvas
      // px. Everything below (clear, dot loop, blit) is scoped to this, so
      // cost tracks the influence area rather than the canvas area.
      let bx0 = Infinity, by0 = Infinity, bx1 = -Infinity, by1 = -Infinity;
      const addBox = (x0, y0, x1, y1) => {
        if (x0 < bx0) bx0 = x0; if (y0 < by0) by0 = y0;
        if (x1 > bx1) bx1 = x1; if (y1 > by1) by1 = y1;
      };
      if (cursorGlow > 0.004 && smoothX > -9000) {
        const m = R + 56;              // radius + bulge/drag/ambient headroom
        addBox(smoothX - m, smoothY - m, smoothX + m, smoothY + m);
      }
      for (const g of rings) {
        const bb = g.r + 3.5 * g.sigma + g.amp + 8;
        addBox(g.x - bb, g.y - bb, g.x + bb, g.y + bb);
      }
      if (bx0 === Infinity) {           // nothing to draw this frame
        this._dgRaf = requestAnimationFrame(draw);
        return;
      }
      // Pixel rect for this frame, unioned with last frame's so the previous
      // paint is erased rather than smeared.
      // 6px pad: the dot loop iterates whole cells, and ambient shimmer nudges
      // each dot up to ~3px after the box is computed, so edge dots can paint
      // just outside the raw bounds.
      const cdx = Math.max(0, Math.floor(bx0) - 6), cdy = Math.max(0, Math.floor(by0) - 6);
      const cdw = Math.min(W, Math.ceil(bx1) + 6) - cdx, cdh = Math.min(H, Math.ceil(by1) + 6) - cdy;
      const ux0 = Math.min(cdx, this._dgDX == null ? cdx : this._dgDX);
      const uy0 = Math.min(cdy, this._dgDY == null ? cdy : this._dgDY);
      const ux1 = Math.max(cdx + cdw, this._dgDX == null ? cdx + cdw : this._dgDX + this._dgDW);
      const uy1 = Math.max(cdy + cdh, this._dgDY == null ? cdy + cdh : this._dgDY + this._dgDH);
      for (let y = uy0; y < uy1; y++) px32.fill(0, y * W + ux0, y * W + ux1);

      // Dot index range covering the dirty box
      const c0 = Math.max(0, Math.floor((bx0 - sx) / cell));
      const c1 = Math.min(cols - 1, Math.ceil((bx1 - sx) / cell));
      const r0 = Math.max(0, Math.floor((by0 - sy) / cell));
      const r1 = Math.min(rows - 1, Math.ceil((by1 - sy) / cell));

      for (let ry = r0; ry <= r1; ry++) {
        const cy = sy + ry * cell, rowBase = ry * cols;
        // ambient phases are linear in cx/cy — recomputed rather than stored
        const p2 = cy * 0.018;
        for (let rx = c0; rx <= c1; rx++) {
          const cx = sx + rx * cell, i = rowBase + rx;
          const p1 = cx * 0.011 + cy * 0.006, p3 = cx * 0.009 + cy * 0.004;

          // ambient flowing-water shimmer
          const wave = fsin(p1 + T) + fsin(p2 - T * 1.25);
          const wx = fcos(p3 + T * 0.9) * 2.6;
          const wy = wave * 2.4;
          let a = baseA * (0.45 + 0.55 * (wave * 0.5 + 0.5));

          // target displacement this frame
          let tx = 0, ty = 0;

          // 1. surface bulge + directional drag around the cursor (only active/visible when cursorGlow > 0)
          const dx = cx - smoothX, dy = cy - smoothY, dsq = dx * dx + dy * dy;
          const currentR2 = R2 * cursorGlow;
          if (cursorGlow > 0.005 && dsq <= currentR2) {
            const dist = Math.sqrt(dsq) || 0.5;
            const currentR = R * Math.sqrt(cursorGlow);
            let t = 1 - dist / currentR;
            t = t * t * (3 - 2 * t); // smoothstep falloff
            tx += (dx / dist) * BULGE * t * cursorGlow + dragX * t * cursorGlow;
            ty += (dy / dist) * BULGE * t * cursorGlow + dragY * t * cursorGlow;
            a = Math.max(a, baseA + (activeA - baseA) * t * cursorGlow);
          }

          // Radial mask out to the cull boundary. The loop only visits dots
          // inside the dirty box, so without this the ambient shimmer stops
          // dead at the box edge and the box itself shows up as a faint
          // RECTANGLE over the red. Measured before adding it: mean alpha
          // stepped 1.56 -> 0 at the boundary. Applied after the bulge (which
          // has its own falloff but floors at baseA) and before the ripples,
          // whose gaussian crests fade out inside their own padded bounds.
          const mt = 1 - Math.sqrt(dsq) / MASK_R;
          a *= mt <= 0 ? 0 : mt * mt * (3 - 2 * mt);

          // 2. ripple rings — a gaussian crest passing through the dot
          for (const g of rings) {
            if (g.r < 0) continue;
            const bb = g.r + 3.5 * g.sigma;
            const gx = cx - g.x, gy = cy - g.y;
            if (gx > bb || gx < -bb || gy > bb || gy < -bb) continue;
            const gd = Math.sqrt(gx * gx + gy * gy) || 0.5;
            const off = gd - g.r;
            if (off > 3.5 * g.sigma || off < -3.5 * g.sigma) continue;
            const crest = Math.exp(-(off * off) / (2 * g.sigma * g.sigma));
            const push = g.amp * crest;
            tx += (gx / gd) * push;
            ty += (gy / gd) * push;
            a = Math.min(0.95, a + crest * (g.amp / 22) * 0.5); // the crest glints
          }

          // ease toward the target — this is the water smoothness
          const ox = (OX[i] += (tx - OX[i]) * 0.09);
          const oy = (OY[i] += (ty - OY[i]) * 0.09);

          const ix = (cx + ox + wx) | 0, iy = (cy + oy + wy) | 0;
          if (ix >= 0 && ix < W && iy >= 0 && iy < H) {
            // cursorGlow folded in here instead of canvas.style.opacity
            const aOut = a * cursorGlow;
            const A = (aOut * 255) | 0;
            if (A > 0) {
              px32[iy * W + ix] = (A << 24) | 0x00FFFFFF; // white, alpha A (little-endian)
              if (a > 0.45 && ix + 1 < W && iy + 1 < H) {
                // bright dots (cursor glow / ripple crests) get a 2x2 glint
                const half = (((aOut * 140) | 0) << 24) | 0x00FFFFFF;
                px32[iy * W + ix + 1] = half;
                px32[(iy + 1) * W + ix] = half;
              }
            }
          }
        }
      }
      // Dirty-rect blit: a full-buffer putImageData uploads 9.1MB every frame
      // regardless of how little changed, which would swamp the culling above.
      ctx.putImageData(frame, 0, 0, ux0, uy0, ux1 - ux0, uy1 - uy0);
      this._dgDX = cdx; this._dgDY = cdy; this._dgDW = cdw; this._dgDH = cdh;
      this._dgRaf = requestAnimationFrame(draw);
    };
    this._dgCleanup = () => {
      if (this._dgRaf) cancelAnimationFrame(this._dgRaf);
      clearTimeout(dgIdleTimeout);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseleave', onLeave);
      window.removeEventListener('click', onClick);
    };
    draw();
  }

  _setupNavScramble() {
    const labels = ['ABOUT US', 'PROJECTS', 'TEAM', 'CONTACT US'];
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ#%&*<>/';
    const spans = [...document.querySelectorAll('#cap-scaler span')].filter((s) => {
      const t = (s.textContent || '').trim();
      const r = s.getBoundingClientRect();
      return labels.includes(t) && r.top < 300;
    });
    if (spans.length < 4 && (this._navTries = (this._navTries || 0) + 1) < 40) {
      setTimeout(() => this._setupNavScramble(), 200);
      return;
    }
    const reducedNav = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    spans.forEach((el) => {
      const target = (el.textContent || '').trim();
      el.classList.add('cap-nav'); // nowrap exception — keeps CONTACT US on one line
      el.style.cursor = 'pointer';
      if (reducedNav) return; // keep the affordance, skip the scramble motion
      let iv = null;
      el.addEventListener('mouseenter', () => {
        let frame = 0;
        clearInterval(iv);
        iv = setInterval(() => {
          el.textContent = target.split('').map((c, i) => {
            if (c === ' ') return ' ';
            if (i < frame / 2.4) return target[i];
            return chars[Math.floor(Math.random() * chars.length)];
          }).join('');
          frame++;
          if (frame / 2.4 >= target.length) { clearInterval(iv); el.textContent = target; }
        }, 32);
      });
    });
  }

  _setupScrollProgress() {
    // Thin brand-red hairline along the top tracking scroll position.
    if (document.getElementById('cap-progress')) return;
    const bar = document.createElement('div');
    bar.id = 'cap-progress';
    document.body.appendChild(bar);
    let ticking = false;
    const update = () => {
      ticking = false;
      const max = document.documentElement.scrollHeight - window.innerHeight;
      const p = max > 0 ? Math.min(window.scrollY / max, 1) : 0;
      bar.style.transform = 'scaleX(' + p.toFixed(4) + ')';
    };
    this._onProgressScroll = () => {
      if (!ticking) {
        ticking = true;
        requestAnimationFrame(update);
      }
    };
    window.addEventListener('scroll', this._onProgressScroll, { passive: true });
    window.addEventListener('resize', this._onProgressScroll);
    update();
  }

  _setupMagneticBtn() {
    // Magnetic pull on the circular menu button: within 110px the button
    // leans toward the cursor (max 8px), easing back on exit. Composes with
    // the CSS hover scale via the --capMx/--capMy/--capMs custom properties.
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    if (!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;
    const btn = document.getElementById('cap-menu-btn');
    if (!btn) {
      if ((this._magTries = (this._magTries || 0) + 1) < 20) {
        setTimeout(() => this._setupMagneticBtn(), 250);
      }
      return;
    }
    const RADIUS = 110;
    const PULL = 8;
    this._onMagneticMove = (e) => {
      if (btn.style.opacity === '0' || btn.style.pointerEvents === 'none') return;
      const r = btn.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      const dist = Math.hypot(dx, dy);
      if (dist < RADIUS) {
        const f = (1 - dist / RADIUS) * PULL;
        btn.style.setProperty('--capMx', ((dx / dist) * f || 0).toFixed(1) + 'px');
        btn.style.setProperty('--capMy', ((dy / dist) * f || 0).toFixed(1) + 'px');
      } else {
        btn.style.setProperty('--capMx', '0px');
        btn.style.setProperty('--capMy', '0px');
      }
    };
    window.addEventListener('mousemove', this._onMagneticMove, { passive: true });
  }

  _setupHeroIntro() {
    const scaler = document.getElementById('cap-scaler');
    if (!scaler) return;

    // 1. VERTICAL GRID LINES REVEAL (scales scaleX from 0 to 1 for rotated 90deg SVGs)
    const svgs = [...scaler.querySelectorAll('svg')].filter(el => {
      const transform = el.style.transform || '';
      if (!(transform.includes('matrix(0,1,-1,0') || transform.includes('matrix(0, 1, -1, 0'))) return false;
      // Rotated svgs are positioned by the matrix ty, NOT style.top — the
      // old `style.top || 0` default adopted the portfolio's red rail lines
      // (3,700px down the page) and the appended scaleX then broke the
      // journey band's anchored matrix shift, stranding them off-position.
      const mm = transform.match(/matrix\([^,]+,[^,]+,[^,]+,[^,]+,\s*[-\d.]+,\s*([-\d.]+)\)/);
      const y = mm ? parseFloat(mm[1]) : (parseFloat(el.style.top) || 0);
      return y <= 1000;
    });

    svgs.forEach((el, idx) => {
      const originalTransform = el.style.transform || '';
      el.style.transformOrigin = '0 0';
      el.style.transform = originalTransform + ' scaleX(0)';
      el.style.transition = 'transform 1.6s cubic-bezier(0.16, 1, 0.3, 1)';
      
      setTimeout(() => {
        el.style.transform = originalTransform + ' scaleX(1)';
      }, 100 + idx * 80);
    });

    // 2. SPLIT-TEXT CHAR STAGGER WAVE REVEAL (hero region only)
    // Position must come from the RENDERED rect: nested spans (e.g. the
    // "$500" / "16 Assets" stats) carry no inline top, and the old
    // `style.top || 0` default let them into the hero filter — their
    // word-wrap containers (inline-block, overflow:hidden, va:bottom,
    // margin-right .22em) then broke the odometer baseline and tracking.
    const scRectHero = scaler.getBoundingClientRect();
    const mHero = (scaler.style.transform || '').match(/scale\(([^)]+)\)/);
    const sHero = mHero ? parseFloat(mHero[1]) : 1;
    const headings = [...scaler.querySelectorAll('span, p, h1, h2, h3')].filter(el => {
      const r = el.getBoundingClientRect();
      const top = r.height ? (r.top - scRectHero.top) / sHero : (parseFloat(el.style.top) || 0);
      if (top > 850) return false;
      const style = window.getComputedStyle(el);
      const fontSize = parseFloat(style.fontSize) || 0;
      const txt = (el.textContent || '').trim();
      return fontSize >= 24 && txt.length > 3 && !el.querySelector('*') && txt !== 'CAPPELLA';
    });

    headings.forEach((el) => {
      const originalText = el.textContent || '';
      el.innerHTML = '';
      
      const words = originalText.split(/\s+/);
      const wordSpans = words.map(word => {
        const charSpans = word.split('').map(char => {
          const s = document.createElement('span');
          s.textContent = char;
          s.style.display = 'inline-block';
          s.style.opacity = '0';
          s.style.transform = 'translateY(110%)';
          s.style.transition = 'transform 0.8s cubic-bezier(0.215, 0.61, 0.355, 1), opacity 0.8s ease';
          return s;
        });
        
        const wordContainer = document.createElement('span');
        wordContainer.style.display = 'inline-block';
        wordContainer.style.overflow = 'hidden';
        wordContainer.style.whiteSpace = 'nowrap';
        wordContainer.style.verticalAlign = 'bottom';
        wordContainer.style.marginRight = '0.22em';
        
        charSpans.forEach(cs => wordContainer.appendChild(cs));
        return { container: wordContainer, chars: charSpans };
      });

      wordSpans.forEach(ws => el.appendChild(ws.container));

      const allChars = wordSpans.flatMap(ws => ws.chars);

      setTimeout(() => {
        allChars.forEach((cs, cIdx) => {
          setTimeout(() => {
            cs.style.opacity = '1';
            cs.style.transform = 'translateY(0)';
          }, cIdx * 20);
        });
      }, 250);
    });
  }

  _setupHeroTitle() {
    // The 100px headline ("India's Leading / Edu-Infra Asset / Management
    // Company") is a single span with <br> children, so the generic char
    // reveal above skips it (!el.querySelector('*')). Animate it here:
    // per-line masks, chars rising with a settle rotation, then a
    // scroll-linked exit where each line drifts up into its mask and fades.
    const scaler = document.getElementById('cap-scaler');
    const heroTitle = scaler && [...scaler.querySelectorAll('span')].find(el => {
      const top = parseFloat(el.style.top) || 0;
      const fs = parseFloat(window.getComputedStyle(el).fontSize) || 0;
      return top < 850 && fs >= 90;
    });
    if (!heroTitle) {
      if ((this._htTries = (this._htTries || 0) + 1) < 40) setTimeout(() => this._setupHeroTitle(), 200);
      return;
    }
    if (heroTitle.dataset.capAnimated) return;
    heroTitle.dataset.capAnimated = '1';
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    // Rebuild the span preserving its <br> line structure
    const lines = [];
    let current = [];
    [...heroTitle.childNodes].forEach(n => {
      if (n.nodeType === Node.ELEMENT_NODE && n.tagName === 'BR') {
        lines.push(current.join(' '));
        current = [];
      } else if (n.textContent && n.textContent.trim()) {
        current.push(n.textContent.trim());
      }
    });
    if (current.length) lines.push(current.join(' '));
    if (!lines.length) return;

    heroTitle.innerHTML = '';
    const lineEls = lines.map(lineText => {
      const lineMask = document.createElement('span');
      // padding-bottom leaves room inside the overflow:hidden clip for glyph
      // descenders (g, y, p, j…); the matching negative margin cancels the
      // added height so the 3-line stack keeps its exact spacing.
      lineMask.style.cssText = 'display:block; overflow:hidden; white-space:nowrap; padding-bottom:0.25em; margin-bottom:-0.25em;';
      const lineInner = document.createElement('span');
      lineInner.style.cssText = 'display:block; will-change:transform;';
      const chars = [];
      lineText.split(/\s+/).forEach((word, wi, arr) => {
        const w = document.createElement('span');
        w.style.cssText = 'display:inline-block; white-space:nowrap;' +
          (wi < arr.length - 1 ? ' margin-right:0.25em;' : '');
        word.split('').forEach(ch => {
          const c = document.createElement('span');
          c.textContent = ch;
          c.style.cssText =
            'display:inline-block; opacity:0;' +
            'transform:translateY(115%) rotate(6deg); transform-origin:0% 100%;' +
            'transition: transform 1.05s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.5s ease;';
          w.appendChild(c);
          chars.push(c);
        });
        lineInner.appendChild(w);
      });
      lineMask.appendChild(lineInner);
      heroTitle.appendChild(lineMask);
      return { lineInner, chars };
    });

    // Staggered entrance: line by line, chars cascading within each line.
    // Gated on the preloader actually finishing (the red curtain clearing)
    // instead of a fixed timer — the curtain wipe runs ~1.1s–2.2s, so a fixed
    // 1150ms start played the whole reveal behind the curtain and it was gone
    // by the time the page came into frame. The preloader calls _heroReveal
    // when it exits; if it already exited we run now, and a safety timeout
    // guarantees the title is never left hidden.
    let heroRevealed = false;
    const runHeroReveal = () => {
      if (heroRevealed) return;
      heroRevealed = true;
      lineEls.forEach((L, li) => {
        L.chars.forEach((c, ci) => {
          setTimeout(() => {
            c.style.opacity = '1';
            c.style.transform = 'translateY(0) rotate(0deg)';
          }, li * 140 + ci * 20);
        });
      });
    };
    if (this._preloaderDone) runHeroReveal();
    else this._heroReveal = runHeroReveal;
    setTimeout(runHeroReveal, 3200); // fallback: never leave the title hidden

    // Scroll-linked parallax exit — lower lines leave faster for depth
    if (window.gsap && window.ScrollTrigger) {
      lineEls.forEach((L, li) => {
        window.gsap.to(L.lineInner, {
          y: -(40 + li * 30),
          opacity: 0,
          ease: 'none',
          scrollTrigger: {
            trigger: document.getElementById('cap-viewport'),
            start: 'top top',
            end: () => '+=' + window.innerHeight * 0.8,
            scrub: true
          }
        });
      });
    }
  }

  _setupScrollReveals() {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const scaler = document.getElementById('cap-scaler');
    if (!scaler) return;

    // Helper: get element's true top in page (px), accounting for scaler scale
    const getScaledTop = (el) => {
      const s = parseFloat((scaler.style.transform || 'scale(1)').match(/scale\(([^)]+)\)/)?.[1] || '1');
      const r = el.getBoundingClientRect();
      return r.top + window.scrollY;
    };

    // --- Classify elements by which section they're likely in ---
    // Strategy: find key heading/block elements by text content and position,
    // then add reveal classes + observe with IntersectionObserver.

    const addReveal = (el, cls = 'cap-scroll-reveal', delay = '') => {
      el.classList.add(cls);
      if (delay) el.classList.add(delay);
    };

    // Observe and fire
    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('cap-revealed');
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });

    // SECTION HEADINGS — find large text nodes that are section titles
    const sectionHeadings = [...scaler.querySelectorAll('span, div')].filter(el => {
      const txt = (el.textContent || '').trim();
      const style = window.getComputedStyle(el);
      const fontSize = parseFloat(style.fontSize) || 0;
      return fontSize >= 40 && txt.length > 3 && txt.length < 60;
    });
    // The named 55px section titles get the editorial clip-wipe. IMPORTANT:
    // clip-path zeroes the element's IntersectionObserver area (a fully
    // clipped target never intersects), so wiped elements are revealed by a
    // scroll-position check instead — getBoundingClientRect ignores clip.
    const WIPE_TITLES = ['OUR JOURNEY', 'OUR PORTFOLIO', 'OPERATORS', 'THE CAPPELLA EDGE'];
    const wipeEls = [];
    const normTxt = (el) =>
      (el.textContent || '').replace(/[\u2028\s]+/g, ' ').trim().toUpperCase();
    // Look across ALL large-text candidates for the named titles (they are
    // not reliably inside the first-20 slice used for the generic pass).
    sectionHeadings.forEach((el) => {
      const r = el.getBoundingClientRect();
      if (r.top < window.innerHeight) return; // hero area: skip
      if (WIPE_TITLES.includes(normTxt(el)) && !el.classList.contains('cap-wipe-reveal')) {
        addReveal(el, 'cap-wipe-reveal');
        wipeEls.push(el);
      }
    });
    sectionHeadings.slice(0, 20).forEach((el, i) => {
      // Skip elements in the hero (visible on page load)
      const r = el.getBoundingClientRect();
      if (r.top < window.innerHeight) return;
      if (el.classList.contains('cap-wipe-reveal')) return; // wipe pass owns it
      addReveal(el, 'cap-scroll-reveal');
      io.observe(el);
    });
    if (wipeEls.length) {
      let wipeTick = false;
      const checkWipes = () => {
        wipeTick = false;
        for (let i = wipeEls.length - 1; i >= 0; i--) {
          const r = wipeEls[i].getBoundingClientRect();
          if (r.top < window.innerHeight * 0.88 && r.bottom > 0) {
            wipeEls[i].classList.add('cap-revealed');
            wipeEls.splice(i, 1);
          }
        }
        if (!wipeEls.length) window.removeEventListener('scroll', onWipeScroll);
      };
      const onWipeScroll = () => {
        if (!wipeTick) { wipeTick = true; requestAnimationFrame(checkWipes); }
      };
      window.addEventListener('scroll', onWipeScroll, { passive: true });
      checkWipes();
    }

    // STAT NUMBERS — large metric text ($500 Mn+, 135 Acres, 16 Assets, 75 Years+)
    const statNums = [...scaler.querySelectorAll('span, div')].filter(el => {
      const txt = (el.textContent || '').trim();
      return /^(\$?\d+\s*\w*[+]?)$/.test(txt) || txt.match(/^\d.*[+]$/);
    });
    statNums.forEach((el, i) => {
      const r = el.getBoundingClientRect();
      if (r.top < window.innerHeight) return;
      addReveal(el, 'cap-scale-reveal', 'cap-delay-' + Math.min(i + 1, 5));
      io.observe(el);
    });

    // BODY PARAGRAPHS — description text blocks
    const bodyParas = [...scaler.querySelectorAll('p, span')].filter(el => {
      const txt = (el.textContent || '').trim();
      const style = window.getComputedStyle(el);
      const fontSize = parseFloat(style.fontSize) || 0;
      // Exclude the footer address (the only text with a 6-digit postal
      // code): the line-split froze it at a too-narrow wrap; left alone it
      // renders at its baked 291px width, matching the Figma line breaks.
      // Guard the big stats ("$500 Mn+", "16 Assets"...): under late
      // hydration the computed size can read wrong and let them through;
      // wrapping them in line masks breaks the odometer baseline (an
      // inline-block with overflow:hidden baselines at its bottom edge).
      const inlineFs = parseFloat(el.style.fontSize) || 0;
      if (inlineFs >= 55 || el.dataset.capOdo || el.querySelector('[data-cap-odo]')) return false;
      return fontSize >= 16 && fontSize < 36 && txt.length > 40 && !/\d{6}/.test(txt);
    });
    bodyParas.forEach((el, i) => {
      const r = el.getBoundingClientRect();
      if (r.top < window.innerHeight) return;
      addReveal(el, 'cap-scroll-reveal', 'cap-delay-' + (i % 3 + 1));
      io.observe(el);
    });

    this._scrollRevealIO = io;

    // Initialize Lenis Smooth Scroll & Sync GSAP Ticker
    if (window.Lenis && window.gsap && window.ScrollTrigger) {
      this._lenis = new window.Lenis({
        duration: 1.2,
        easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), // OCI style easing
      });
      this._lenis.on('scroll', window.ScrollTrigger.update);
      window.gsap.ticker.add((time) => {
        this._lenis.raf(time * 1000);
      });
      window.gsap.ticker.lagSmoothing(0);
    }

    this._setupHeroZoom();
    this._setupSplitText();

    // ===== NAV → PAGE NAVIGATION =====
    // The nav/footer labels are Figma-materialized <span>s, not anchors.
    // They now navigate to the real standalone pages (About / Projects /
    // Team / Contact) instead of scrolling within the frame. role="link" +
    // tabindex + Enter make the converted spans keyboard-operable. The
    // scramble hover (_setupNavScramble) binds separately and is unaffected.
    const navItems = [
      { text: 'ABOUT US', href: 'about-us.html' },
      { text: 'PROJECTS', href: 'projects.html' },
      { text: 'PORTFOLIO', href: 'projects.html' },
      { text: 'TEAM', href: 'team.html' },
      { text: 'CONTACT US', href: 'contact-us.html' }
    ];

    // The frame hydrates asynchronously — retry until the nav spans exist
    // (a one-shot timer left the nav dead on slow loads).
    const bindNav = (tries) => {
      let bound = 0;
      navItems.forEach(item => {
        const els = [...scaler.querySelectorAll('span')].filter(el =>
          (el.textContent || '').replace(/\s+/g, '').toUpperCase() === item.text.replace(/\s+/g, '')
        );
        els.forEach(el => {
          if (el._capNavBound) { bound++; return; }
          el._capNavBound = true;
          bound++;
          el.style.cursor = 'pointer';
          el.setAttribute('role', 'link');
          el.setAttribute('tabindex', '0');
          const go = () => { window.location.href = item.href; };
          el.addEventListener('click', go);
          el.addEventListener('keydown', (e) => { if (e.key === 'Enter') go(); });
        });
      });
      if (bound < 4 && tries > 0) setTimeout(() => bindNav(tries - 1), 200);
    };
    setTimeout(() => bindNav(40), 500);

    // ===== FOOTER EMAIL INPUT =====
    setTimeout(() => {
      const emailSpan = [...scaler.querySelectorAll('span')].find(el => 
        (el.textContent || '').trim() === 'Your Email Id'
      );
      if (emailSpan) {
        const input = document.createElement('input');
        input.type = 'email';
        input.placeholder = 'Your Email Id';
        input.style.position = 'absolute';
        input.style.left = emailSpan.style.left || '1138px';
        input.style.top = emailSpan.style.top || '345px';
        input.style.width = emailSpan.style.width || '180px';
        input.style.height = '35px';
        input.style.background = 'transparent';
        input.style.border = 'none';
        input.style.outline = 'none';
        input.style.fontFamily = emailSpan.style.fontFamily || 'Montserrat, sans-serif';
        input.style.fontSize = emailSpan.style.fontSize || '14px';
        input.style.fontWeight = emailSpan.style.fontWeight || '500';
        input.style.color = 'rgb(255,255,255)';
        input.style.borderBottom = '1px solid rgba(255,255,255,0.4)';
        
        emailSpan.parentNode.replaceChild(input, emailSpan);

        const arrowSvg = [...input.parentNode.querySelectorAll('svg')].find(s => 
          s.style.left === '1307px' || (parseFloat(s.style.left) >= 1300 && parseFloat(s.style.left) <= 1320)
        );
        if (arrowSvg) {
          arrowSvg.style.cursor = 'pointer';
          arrowSvg.addEventListener('click', () => {
            if (input.value) {
              alert(`Thank you for subscribing, ${input.value}!`);
              input.value = '';
            } else {
              alert('Please enter a valid email address.');
            }
          });
        }
      }
    }, 500);
  }

  _setupPreloader() {
    // --- OCI-style sequential loader ---
    // Reserve the vertical scrollbar gutter permanently: the page always
    // scrolls once loaded, but during the preloader the scrollbar would
    // otherwise TOGGLE as content height settles — shifting the centered
    // lockup's layout box mid-flight and spoiling the landing.
    // (scrollbar-gutter, unlike overflow-y:scroll, reserves the space
    // without making the viewport scrollable early — which would break the
    // browser's scroll restoration on refresh.)
    document.documentElement.style.scrollbarGutter = 'stable';
    document.documentElement.classList.add('cap-scroll-locked');

    // Full-screen red background
    const preloader = document.createElement('div');
    preloader.style.cssText =
      'position:fixed; inset:0; background:rgb(209,32,47); z-index:9999;' +
      // Exit is a TRAVELING diagonal fade — the panel never moves. A 3×-
      // viewport gradient mask (transparent toward the top-right, opaque
      // toward the bottom-left, wide soft feather between) slides diagonally
      // via mask-position, so every region fades exactly as the band passes
      // it: the dissolve visibly sweeps right → left the whole second. The
      // late opacity fade is a safety net for the final state.
      'transition:mask-position 1.0s cubic-bezier(0.77,0,0.175,1),' +
      '-webkit-mask-position 1.0s cubic-bezier(0.77,0,0.175,1),' +
      'opacity 0.4s ease 0.7s;' +
      'mask-image:linear-gradient(225deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 35%, #000 65%, #000 100%);' +
      '-webkit-mask-image:linear-gradient(225deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 35%, #000 65%, #000 100%);' +
      'mask-size:300% 300%; -webkit-mask-size:300% 300%;' +
      'mask-repeat:no-repeat; -webkit-mask-repeat:no-repeat;' +
      'mask-position:0% 100%; -webkit-mask-position:0% 100%;' +
      'will-change:mask-position, opacity;';
    document.body.appendChild(preloader);

    // Hide the actual header logo on page initially so we don't see double.
    // The wordmark lives in the async Figma bundle and can render AFTER the
    // preloader has already exited (slow/hard refresh) — in that case show it
    // immediately instead of hiding it forever.
    let preloaderFinished = false;
    const hideHeaderWordmark = () => {
      const el = document.querySelector('.fig-asset-7cb777f5a65019d1-0d894d80');
      if (!el) {
        setTimeout(hideHeaderWordmark, 50);
        return;
      }
      el.style.transition = 'opacity 0.25s ease';

      // (No separate C icon in the header — the wordmark stands alone at
      // its baked Figma position.)
      if (preloaderFinished) {
        el.style.opacity = '1';
      } else {
        el.style.opacity = '0';
      }
    };
    hideHeaderWordmark();

    // --- Center logo content ---
    const centerWrap = document.createElement('div');
    centerWrap.style.cssText =
      'position:fixed; inset:0; z-index:10000; pointer-events:none;' +
      'display:flex; flex-direction:column; align-items:center; justify-content:center;';
    document.body.appendChild(centerWrap);

    const logoImg = document.createElement('img');
    logoImg.src = './components/assets/eae7f9bdb03982f5.png';
    logoImg.style.cssText =
      'width:90px; height:auto; opacity:0; transform:scale(0.7);' +
      'transition:transform 0.6s cubic-bezier(0.16,1,0.3,1), opacity 0.5s ease;' +
      'filter:brightness(0) invert(1);'; // Make it white on red
    centerWrap.appendChild(logoImg);

    const nameImg = document.createElement('img');
    nameImg.src = './components/assets/7cb777f5a65019d1.png';
    nameImg.style.cssText =
      'width:160px; height:auto; margin-top:18px; opacity:0;' +
      'transform:translateY(12px);' +
      'transition:transform 0.6s cubic-bezier(0.16,1,0.3,1), opacity 0.5s ease;' +
      'filter:brightness(0) invert(1);'; // White on red
    centerWrap.appendChild(nameImg);

    // === Reduced motion: brand moment without the choreography ===
    // Curtain + lockup appear instantly, hold briefly, then the whole
    // preloader fades out. No pop, no flight, no curtain slide.
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      logoImg.style.transition = 'none';
      nameImg.style.transition = 'none';
      logoImg.style.opacity = '1';
      logoImg.style.transform = 'none';
      nameImg.style.opacity = '1';
      nameImg.style.transform = 'none';
      setTimeout(() => {
        preloaderFinished = true;
        this._preloaderDone = true;
        if (this._heroReveal) { this._heroReveal(); this._heroReveal = null; }
        document.documentElement.classList.remove('cap-scroll-locked');
        const wm = document.querySelector('.fig-asset-7cb777f5a65019d1-0d894d80');
        if (wm) wm.style.opacity = '1';
        preloader.style.transition = 'opacity 0.4s ease';
        centerWrap.style.transition = 'opacity 0.4s ease';
        preloader.style.opacity = '0';
        centerWrap.style.opacity = '0';
        setTimeout(() => {
          centerWrap.remove();
          preloader.remove();
        }, 450);
      }, 700);
      return;
    }

    // === Sequential timing (no crosshair lines, no circles) ===
    // Step 1: Logo icon pops in (200ms)
    setTimeout(() => {
      logoImg.style.opacity = '1';
      logoImg.style.transform = 'scale(1)';
    }, 200);

    // Step 2: Name text slides up (400ms)
    setTimeout(() => {
      nameImg.style.opacity = '1';
      nameImg.style.transform = 'translateY(0)';
    }, 400);

    // Step 3: Exit (1100ms) — the red curtain wipes away diagonally (top-
    // right → bottom-left) with a fade while the centered lockup flies to
    // the header and CROSSFADES into the real one.
    // If the async frame hasn't hydrated the header targets yet, hold the
    // curtain briefly (up to 500ms in 50ms steps) — a flight into the real
    // header beats the fade fallback whenever it's achievable.
    const beginExit = (retries) => {
      const headerWordmark = document.querySelector('.fig-asset-7cb777f5a65019d1-0d894d80');
      if (!headerWordmark && window.scrollY <= 80 && retries > 0) {
        setTimeout(() => beginExit(retries - 1), 50);
        return;
      }
      document.documentElement.classList.remove('cap-scroll-locked');

      // Refresh mid-page: browsers restore the scroll position, so the header
      // targets sit thousands of px above the viewport — a flight would shoot
      // the lockup off-screen. Fade it out in place instead and show the
      // header (via preloaderFinished) for when the user scrolls back up.
      const scrolledAway = window.scrollY > 80;

      if (scrolledAway || !headerWordmark) {
        preloaderFinished = true;
        const exitEase =
          'transform 0.45s cubic-bezier(0.77,0,0.175,1), opacity 0.35s ease, filter 0.4s ease';
        logoImg.style.transition = exitEase;
        nameImg.style.transition = exitEase;
        logoImg.style.transform = 'translateY(-14px)';
        nameImg.style.transform = 'translateY(-14px)';
        logoImg.style.opacity = '0';
        nameImg.style.opacity = '0';
        // Release the invert as the curtain fades under the lockup.
        logoImg.style.filter = 'none';
        nameImg.style.filter = 'none';
      } else {
        // --- Exact FLIP: pivot both images at their top-left corner so the
        // corner-to-corner deltas ARE the transform (the previous version
        // scaled about the center, landing ~25–30px off target). Origins are
        // switched while the transforms are identity, so nothing jumps.
        logoImg.style.transformOrigin = '0 0';
        nameImg.style.transformOrigin = '0 0';

        // Neutralize any still-running entrance transition first: on slow
        // loads the wordmark can be mid-rise (translateY residual) at exit
        // time, and measuring that interpolated box would bake the residual
        // into the landing. All of this happens before the next paint, so
        // the snap to identity is never visible.
        nameImg.style.transition = 'none';
        nameImg.style.transform = 'none';
        nameImg.style.opacity = '1';
        logoImg.style.transition = 'none';
        logoImg.style.transform = 'none';
        logoImg.style.opacity = '1';

        // Force the post-overflow-reset reflow, then measure and launch
        // synchronously (an rAF here would stall in throttled/occluded
        // renderers, freezing the lockup mid-screen). The scrollbar gutter
        // is reserved permanently, so these rects are layout-stable.
        void document.body.offsetHeight;
        {
          const nameRect = nameImg.getBoundingClientRect();
          const wordmarkRect = headerWordmark.getBoundingClientRect();
          // Debug/E2E hook: the exact pre-flight base box this flight was
          // computed from (tests validate the landing without racing the
          // animation timeline).
          window.__capPreFlight = { x: nameRect.left, y: nameRect.top, w: nameRect.width, h: nameRect.height };
          // Width-matched scale + top-left alignment: the CAPPELLA row of the
          // full PNG lands exactly over the header crop; the tagline below it
          // dissolves in the crossfade.
          const nameScale = wordmarkRect.width / nameRect.width;
          const nameTx = wordmarkRect.left - nameRect.left;
          const nameTy = wordmarkRect.top - nameRect.top;

          // The curtain fades during the flight, so release the white-on-red
          // invert filter in step — the wordmark darkens to its natural color
          // as the page lightens underneath (never white-on-white).
          nameImg.style.transition =
            'transform 0.85s cubic-bezier(0.77,0,0.175,1), opacity 0.3s ease, filter 0.5s ease';
          nameImg.style.transform = `translate(${nameTx}px, ${nameTy}px) scale(${nameScale})`;
          nameImg.style.filter = 'none';

          // No C icon lives in the header — the centered icon rises out and
          // fades while the wordmark makes the flight alone.
          logoImg.style.transition =
            'transform 0.6s cubic-bezier(0.77,0,0.175,1), opacity 0.45s ease, filter 0.5s ease';
          logoImg.style.transform = 'translateY(-40px) scale(0.85)';
          logoImg.style.opacity = '0';
          logoImg.style.filter = 'none';

          // Crossfade handoff at 600ms — and RE-TARGET: the scaler's fit/font
          // timers can reflow the header during the flight, drifting the
          // targets a few px. The flown pair's untransformed boxes are stable
          // (fixed overlay), so recompute against the targets' CURRENT rects
          // and glide the final stretch into the exact fresh position while
          // the real lockup fades in underneath.
          setTimeout(() => {
            const wmNow = headerWordmark.getBoundingClientRect();
            const glide = 'transform 0.35s cubic-bezier(0.22,1,0.36,1), opacity 0.3s ease';

            nameImg.style.transition = glide;
            nameImg.style.transform =
              `translate(${wmNow.left - nameRect.left}px, ${wmNow.top - nameRect.top}px) ` +
              `scale(${wmNow.width / nameRect.width})`;

            headerWordmark.style.opacity = '1';
            nameImg.style.opacity = '0';
          }, 600);
        }
      }

      // Diagonal traveling fade: sliding the mask from its opaque bottom-left
      // corner to its transparent top-right corner sweeps the feathered
      // dissolve band across the screen from the top-RIGHT corner to the
      // bottom-LEFT. The mask moves; the panel itself stays put (a moving
      // diagonal panel previously exposed a broken-looking corner strip).
      preloader.style.maskPosition = '100% 0%';
      preloader.style.webkitMaskPosition = '100% 0%';
      preloader.style.opacity = '0';

      // Clean up and restore header logo opacity when preloader completes.
      // Re-query instead of using the refs captured at 1100ms — on slow loads
      // the wordmark renders late and those refs are null (the retry loop in
      // hideHeaderWordmark then handles showing it via preloaderFinished).
      setTimeout(() => {
        preloaderFinished = true;
        // Curtain has cleared — now let the hero title reveal in frame.
        this._preloaderDone = true;
        if (this._heroReveal) { this._heroReveal(); this._heroReveal = null; }
        const wm = document.querySelector('.fig-asset-7cb777f5a65019d1-0d894d80');
        if (wm) wm.style.opacity = '1';
        centerWrap.remove();
        preloader.remove();
      }, 1080); // after the 600ms retarget + 350ms glide settle
    };
    setTimeout(() => beginExit(10), 1100);
  }
