  _setupSplitText() {
    // 5. Staggered Line-Split Quote Reveal
    if (!window.gsap || !window.ScrollTrigger || !window.SplitType) return;
    const scaler = document.getElementById('cap-scaler');
    if (!scaler) return;

    // Apply to main body paragraphs (the ones used for cap-scroll-reveal)
    const bodyParas = [...scaler.querySelectorAll('p, span')].filter(el => {
      const txt = (el.textContent || '').trim();
      const style = window.getComputedStyle(el);
      const fontSize = parseFloat(style.fontSize) || 0;
      // Exclude the footer address (the only text with a 6-digit postal
      // code): the line-split froze it at a too-narrow wrap; left alone it
      // renders at its baked 291px width, matching the Figma line breaks.
      // Guard the big stats ("$500 Mn+", "16 Assets"...): under late
      // hydration the computed size can read wrong and let them through;
      // wrapping them in line masks breaks the odometer baseline (an
      // inline-block with overflow:hidden baselines at its bottom edge).
      const inlineFs = parseFloat(el.style.fontSize) || 0;
      if (inlineFs >= 55 || el.dataset.capOdo || el.querySelector('[data-cap-odo]')) return false;
      return fontSize >= 16 && fontSize < 36 && txt.length > 40 && !/\d{6}/.test(txt);
    });

    bodyParas.forEach((el) => {
      // Clean up previous classes to avoid conflicts
      el.classList.remove('cap-scroll-reveal');
      el.style.opacity = '1';
      el.style.transform = 'none';

      // Use SplitType to split text into lines
      const split = new window.SplitType(el, { types: 'lines' });
      
      // Wrap each line in an overflow hidden mask
      split.lines.forEach(line => {
        const wrapper = document.createElement('div');
        wrapper.style.overflow = 'hidden';
        wrapper.style.display = 'inline-block';
        wrapper.style.verticalAlign = 'top';
        wrapper.style.padding = '0';
        wrapper.style.margin = '0';
        line.parentNode.insertBefore(wrapper, line);
        wrapper.appendChild(line);
        // Initial state for GSAP
        window.gsap.set(line, { yPercent: 100 });
      });

      window.ScrollTrigger.create({
        trigger: el,
        start: "top 90%",
        onEnter: () => {
          window.gsap.to(split.lines, {
            yPercent: 0,
            duration: 1.2,
            ease: "power4.out",
            stagger: 0.08
          });
        }
      });
    });
  }

  _setupFooterAnimations() {
    const scaler = document.getElementById('cap-scaler');
    if (!scaler || this._footerAnimated) return;
    this._footerAnimated = true;

    // The global "white-space: normal !important" rule collapses the footer
    // address's authored newlines; restore pre-line on just that span so it
    // wraps to the Figma line layout (inline !important beats the stylesheet).
    const addrSpan = [...scaler.querySelectorAll('span')].find(
      el => el.childElementCount === 0 && /niharika/i.test(el.textContent || '')
    );
    if (addrSpan) addrSpan.style.setProperty('white-space', 'pre-line', 'important');
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const m = (scaler.style.transform || '').match(/scale\(([^)]+)\)/);
    const scale = m ? parseFloat(m[1]) : 1;
    const scalerRect = scaler.getBoundingClientRect();
    const frameBox = (el) => {
      const r = el.getBoundingClientRect();
      return { top: (r.top - scalerRect.top) / scale, left: (r.left - scalerRect.left) / scale,
               w: r.width / scale, h: r.height / scale };
    };
    const hasMatrix = (el) => ((el.getAttribute('style') || '').includes('matrix'));

    // ===== FOOTER REVEAL =====
    const footer = [...scaler.querySelectorAll('div')].find(d => d.getAttribute('data-original-top') === '7352');
    if (!footer) return;
    const footerTopFrame = parseFloat(footer.style.top) || 7352;

    // Underline-wipe hover on footer links
    const linkTexts = ['ABOUT US', 'PORTFOLIO', 'TEAM', 'CONTACT US', 'LINKEDIN', 'PARTNER@CAPPELLA.IN'];
    [...footer.querySelectorAll('span')].forEach(sp => {
      const t = (sp.textContent || '').trim().toUpperCase();
      if (linkTexts.includes(t)) {
        sp.classList.add('cap-ft-link');
        sp.style.cursor = 'pointer';
        // The 4 nav labels get page navigation from the navItems loop above.
        // The email label opens mail here; LINKEDIN stays label-only (no URL
        // exists in the source material — none invented).
        if (t === 'PARTNER@CAPPELLA.IN') {
          sp.setAttribute('role', 'link');
          sp.setAttribute('tabindex', '0');
          const mail = () => { window.location.href = 'mailto:partner@cappella.in'; };
          sp.addEventListener('click', mail);
          sp.addEventListener('keydown', (e) => { if (e.key === 'Enter') mail(); });
        }
      }
    });

    // Email input focus states + arrow nudge
    const emailInput = footer.querySelector('input[type="email"]');
    if (emailInput) {
      emailInput.style.transition = 'border-color 0.4s ease';
      emailInput.addEventListener('focus', () => { emailInput.style.borderBottom = '1px solid rgba(255,255,255,0.95)'; });
      emailInput.addEventListener('blur', () => { emailInput.style.borderBottom = '1px solid rgba(255,255,255,0.4)'; });
    }
    const arrow = [...footer.querySelectorAll('svg')].find(sv => {
      const l = parseFloat(sv.style.left);
      return l >= 1300 && l <= 1345;
    });
    if (arrow) {
      arrow.style.transition = 'transform 0.35s var(--cap-ease-power)';
      arrow.addEventListener('mouseenter', () => { arrow.style.transform = 'translateX(5px)'; });
      arrow.addEventListener('mouseleave', () => { arrow.style.transform = 'translateX(0)'; });
    }

    if (reduced) return;

    // Stage every footer element: big C logo wipes in, the rest rise
    // column-by-column (delay keyed to their position in the footer)
    const bigLogo = footer.querySelector('.fig-asset-c9d8f12cf6e90c99');
    const kids = [...footer.children].filter(el => {
      if (parseFloat(el.style.width) > 1400) return false; // red background slab
      return true;
    });
    const staged = [];
    kids.forEach(el => {
      const b = frameBox(el);
      const relTop = b.top - footerTopFrame;
      const delay = 0.15 + (b.left / 1440) * 0.4 + Math.max(0, relTop / 530) * 0.15;
      // Each element gets a show/hide PAIR so the choreography is two-way:
      // it retracts once the footer leaves the viewport and replays on the
      // next visit (hide() is also the initial state).
      if (el === bigLogo) {
        // Big C: clip wipe + a soft scale settle
        el.style.transition =
          'clip-path 1.1s var(--cap-ease-expo) 0.1s, transform 1.1s var(--cap-ease-expo) 0.1s';
        staged.push({
          show() { el.style.clipPath = 'inset(0 0% 0 0)'; el.style.transform = 'scale(1)'; },
          hide() { el.style.clipPath = 'inset(0 100% 0 0)'; el.style.transform = 'scale(1.04)'; }
        });
      } else if (el.tagName.toLowerCase() === 'svg' || hasMatrix(el)) {
        // Divider hairlines carry Figma matrix transforms — never touch
        // transform; draw them downward via clip only. transform stays in
        // the transition list so the arrow's hover nudge keeps easing.
        el.style.transition =
          'clip-path 1.2s var(--cap-ease-expo) 0.2s, transform 0.35s var(--cap-ease-power)';
        staged.push({
          show() { el.style.clipPath = 'inset(0 0 -2% 0)'; },
          hide() { el.style.clipPath = 'inset(0 0 100% 0)'; }
        });
      } else {
        // Text/content children: fade + rise (the transform channel is free
        // — the old curtain scrub is long gone)
        el.style.transition =
          'opacity 0.85s var(--cap-ease-expo) ' + delay + 's, ' +
          'transform 0.85s var(--cap-ease-expo) ' + delay + 's';
        staged.push({
          show() { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; },
          hide() { el.style.opacity = '0'; el.style.transform = 'translateY(16px)'; }
        });
      }
    });
    staged.forEach(p => p.hide()); // arm the entrance

    // Two-way gate with hysteresis: the choreography plays on the first
    // visible sliver of the footer and RETRACTS once the footer has fully
    // left the viewport — so the entrance replays on every visit (reverse
    // is armed off-screen, never mid-view, so it can't flicker). Show fires
    // on ~2% of the footer's visible height (a few px — at wide viewports
    // the scaled footer is far taller than the screen, so percentage-of-
    // element thresholds can never be large).
    let footerShown = false;
    const setShown = (on) => {
      if (on === footerShown) return;
      footerShown = on;
      if (on) {
        staged.forEach(p => p.show());
        // Releases the CSS-held hidden state of the footer's out-of-container
        // siblings (staggered rise, see the stylesheet)
        scaler.classList.add('cap-footer-in');
      } else {
        staged.forEach(p => p.hide());
        scaler.classList.remove('cap-footer-in');
      }
    };
    const gate = () => {
      const r = footer.getBoundingClientRect();
      const vh = window.innerHeight;
      const overlap = Math.min(r.bottom, vh) - Math.max(r.top, 0);
      const frac = overlap / Math.min(r.height || 1, vh);
      if (!footerShown && frac > 0.02) setShown(true);
      else if (footerShown && frac <= 0) setShown(false);
    };
    this._footerGate = gate;
    window.addEventListener('scroll', gate, { passive: true });
    // IO backs up the scroll listener (e.g. programmatic jumps that land
    // without further scroll events)
    const io = new IntersectionObserver(gate, { threshold: [0, 0.01, 0.05] });
    io.observe(footer);
    gate();

    // ===== FOOTER SIBLINGS: CSS-CLASS REVEAL (re-hydration-proof) =====
    // History: a scroll-scrubbed "curtain" ghosted these siblings above the
    // footer, and per-element inline hide-then-show reveals raced the DC
    // frame's RE-HYDRATION (which replaces the footer DOM after setup) and
    // could strand the footer invisible.
    //
    // The current mechanism cannot strand: the hidden state lives in CSS,
    // keyed off the data-original-top tags that adjustFooter re-applies on
    // every re-hydration, gated by #cap-scaler:not(.cap-footer-in). The
    // .cap-footer-in gate (see setShown above) is global and two-way with
    // hysteresis — shown while any sliver of the footer is on screen,
    // retracted only once it has fully left, so it replays per visit and a
    // re-created element automatically re-acquires whichever state is
    // current. Transforms are translateY only and never cross the footer's
    // top edge, so the old ghost is impossible too.
  }

  _setupJourneyBand() {
    // Opens a dynamic scroll gap in the frame for the pinned journey and
    // hides the old baked journey band [3140, 3890). The gap (delta, frame
    // px) makes room for JOURNEY_VH viewport-heights of scrub:
    // delta = hostFramePx - 750. jorig bookkeeping keeps the shift
    // idempotent AND recomputable on resize; re-runs from the adjustFooter
    // observer pipeline so newly hydrated elements are handled too.
    const scaler = document.getElementById('cap-scaler');
    const vp = document.getElementById('cap-viewport');
    if (!scaler || !vp || this._journeyBandDone) return;
    this._journeyBandDone = true;

    const JBAND_TOP = 3140;    // frame-y where the old journey band starts
    const JBAND_BOTTOM = 3890; // first content below the old band
    this._jBandTop = JBAND_TOP;
    this._jVH = 4.3;           // host height in viewport-heights

    const computeDelta = () => {
      const s = vp.clientWidth / 1440;
      const hostFrame = (this._jVH * capVH()) / s;
      return Math.max(0, Math.round(hostFrame - (JBAND_BOTTOM - JBAND_TOP)));
    };
    this._jComputeDelta = computeDelta;
    this._jDelta = computeDelta();

    const shiftJourney = () => {
      const frameRoot = scaler.querySelector('[class*="sc-host"]');
      if (!frameRoot) return;
      const d = this._jDelta || 0;
      // The frame's root container carries the baked design height (8372)
      // WITH overflow:hidden — grow it by the delta or everything shifted
      // past 8372 (the footer!) is clipped invisible.
      const wraps = [frameRoot, ...frameRoot.querySelectorAll('div')];
      for (let i = 0; i < wraps.length; i++) {
        const w = wraps[i];
        let oh = w.getAttribute('data-jorig-h');
        oh = oh !== null ? parseFloat(oh) : parseFloat(w.style.height);
        if (!isNaN(oh) && oh >= 8300 && oh <= 8450) {
          if (w.getAttribute('data-jorig-h') === null) {
            w.setAttribute('data-jorig-h', String(oh));
          }
          w.style.height = (oh + d) + 'px';
        }
      }

      const els = frameRoot.querySelectorAll('*');
      for (let i = 0; i < els.length; i++) {
        const el = els[i];
        // Elements whose position is owned by another system (e.g. the
        // portfolio city logo, which alignLogo() re-anchors continuously)
        if (el.getAttribute('data-jexempt')) continue;
        // top-positioned elements
        let orig = el.getAttribute('data-jorig-top');
        orig = orig !== null ? parseFloat(orig) : parseFloat(el.style.top);
        if (!isNaN(orig)) {

          // "Phase"/"Foundation" spans (baked top 3630) land exactly on
          // 3890 after the +260 band shift — a strict < let them escape
          // the hide and ghost over the footer as stray white text.
          if (orig >= JBAND_TOP + 10 && orig <= JBAND_BOTTOM) {
            if (!el.getAttribute('data-jhidden')) {
              el.setAttribute('data-jhidden', '1');
              el.style.display = 'none';
            }
            continue;
          }
          // Footer family (>= 7300) stays: adjustFooter positions it with
          // the delta itself.
          if (orig > JBAND_BOTTOM && orig < 7300) {
            if (el.getAttribute('data-jorig-top') === null) {
              el.setAttribute('data-jorig-top', String(orig));
            }
            el.style.top = (orig + d) + 'px';
            continue;
          }

        // system's trailing scaleX) — an anchored match would silently skip
        // the element and strand it at its unshifted position.
        const tf = el.style.transform || '';

          // hairline (an svg the pinned journey's white curve joins onto)
          // legitimately sits at ty exactly 3890 and must stay visible.
          if (ty >= JBAND_TOP + 10 && ty < JBAND_BOTTOM) {

              el.setAttribute('data-jhidden', '1');
              el.style.display = 'none';

          }
        }

      ['fig-asset-9943ffc227529f04', 'fig-asset-531180345e372e44'].forEach((c) => {
        frameRoot.querySelectorAll('[class*="' + c + '"]').forEach((el) => {
          el.style.display = 'none';

      // old journey band (its counterpart lived inside the band). With the
      // pinned journey that offset reads as a floating gap — anchor the
      // segment's top to the band bottom (3890) and stretch it so its lower
      // end stays put (485 → 567). Idempotent: jorig-ty then feeds every
      // later pass, and the tolerant matrix rewrite preserves the scaleX.
      const rail = [...frameRoot.querySelectorAll('svg[width="485"]')].find((el) =>
        /^matrix\(0,\s*1,\s*-1,\s*0,\s*178,\s*[-\d.]+\)/.test(el.style.transform || '')

        rail.setAttribute('data-jorig-ty', '3890');

      }

          // Marker boxes in canvas coords, measured once (positions and
          // fonts are canvas-fixed; re-measured on webfont load)
          if (!ph._mBoxes && ph._markers && ph._markers.length && sc2 > 0) {
            ph._mBoxes = ph._markers.map((m) => {
              const r = m.getBoundingClientRect();
              return { right: (r.right - srect.left) / sc2, bottom: (r.bottom - srect.top) / sc2 };
            });
          }
          // The building may grow only while every time node + text stays
          // clear of it: per marker, EITHER the facade starts right of the
          // text (kH) OR its roofline stays below the text (kV)
          const nat = PNAT[i];
          let kSafe = Infinity;
          (ph._mBoxes || []).forEach((mb) => {
            const kH = (xRight + BDIM[i][1] - (mb.right + 14)) / BDIM[i][0];
            const kV = ((HY - (mb.bottom + 24)) * nat[0]) / ((nat[2] - nat[3]) * BDIM[i][0]);
            kSafe = Math.min(kSafe, Math.max(kH, kV));
          });
          const k = Math.max(1, Math.min(sizeK, kSafe));
          const bs = (BDIM[i][0] * k) / nat[0];
          b.style.width = (BDIM[i][0] * k).toFixed(1) + 'px';
          b.style.right = (CW - xRight + BDIM[i][1]).toFixed(1) + 'px';
          b.style.bottom = ((CH - HY) - (nat[1] - nat[2]) * bs).toFixed(1) + 'px';
          if (ph._positionShadow) ph._positionShadow();
        });
      }
      setTail(scale, w, h);
      // Full-bleed sky: scale so it spans the pin's width AND reaches the
      // pin's top edge, with its horizon row (698/807 of the image) pinned
      // to the stage's design horizon
      if (skyImg) {
        const yH = (h - CH * scale) / 2 + HY * scale;
        const ss = Math.max(w / 1543, yH / 698);
        skyImg.style.width = (1543 * ss).toFixed(1) + 'px';
        skyImg.style.height = (807 * ss).toFixed(1) + 'px';
        skyImg.style.left = ((w - 1543 * ss) / 2).toFixed(1) + 'px';
        skyImg.style.top = (yH - 698 * ss).toFixed(1) + 'px';
      }
    };

    let mx = 0, my = 0;
    let curG = 0, targetG = 0;
    let inView = true;
    const smooth = 0.09;

    const onScroll = () => {
      const rect = host.getBoundingClientRect();
      // Must match the height layout() gave the host, or the scrub
      // denominator disagrees with the track and progress jumps.
      const vh = capVH();
      const total = host.offsetHeight - vh;
      targetG = total > 0 ? clamp(-rect.top / total, 0, 1) : 0;
      inView = rect.bottom > -300 && rect.top < vh + 300;
    };

    const update = (g) => {
      const t = g * 3;
      const now = performance.now();
      let active = 0, best = -1;
      let shiftNum = 0, shiftDen = 0;
      phases.forEach((ph, i) => {
        const local = t - i;
        const inLeft = clamp((local + 0.22) / 0.40, 0, 1);
        const outRight = clamp((1.22 - local) / 0.40, 0, 1);
        const op = Math.min(inLeft, outRight);
        ph.style.opacity = op.toFixed(3);
        ph.style.pointerEvents = op > 0.5 ? 'auto' : 'none';
        if (op > best) { best = op; active = i; }
        shiftNum += op * HORIZON_SHIFT[i];
        shiftDen += op;

        const lc = clamp(local, 0, 1);
        const zoomP = clamp(local / 0.6, 0, 1);
        const zEase = reduce ? zoomP : easeOutBack(zoomP);
        const s = 1.14 - 0.14 * zEase;
        // No vertical motion: the base must stay planted on the horizon
        // (client note 2026-07-17: "objects are literally floating").
        // The phase drift and cursor parallax run horizontally only.
        const drift = reduce ? 0 : (lc - 0.5) * -34;
        const pbx = reduce ? 0 : mx * -16;
        const b = ph._building;
        if (b) b.style.transform = 'translate(' + (pbx + drift).toFixed(1) + 'px, 0px) scale(' + s.toFixed(3) + ')';
        if (ph._svg) ph._svg.style.transform = reduce ? '' : 'translate(' + (mx * 8).toFixed(1) + 'px, ' + (my * 5).toFixed(1) + 'px)';

        const sh = ph._shadow;
        if (sh) {
          const baseTop = parseFloat(sh.dataset.baseTop || '0');
          sh.style.top = baseTop.toFixed(1) + 'px';
          sh.style.transform = 'translateX(' + (pbx + drift).toFixed(1) + 'px) scaleX(' + s.toFixed(3) + ') scaleY(' + (0.8 + 0.2 * zoomP).toFixed(3) + ')';
          sh.style.opacity = (op * 0.55).toFixed(3);
        }

        const drawT = clamp(local / 0.72, 0, 1);
        const path = ph._path, len = ph._len;
        path.style.strokeDashoffset = (len * (1 - drawT)).toFixed(1);

        const tip = ph._tip;
        if (tip) {
          if (drawT > 0.002 && drawT < 0.997 && op > 0.05) {
            const pt = path.getPointAtLength(len * drawT);
            tip.setAttribute('cx', pt.x.toFixed(1));
            tip.setAttribute('cy', pt.y.toFixed(1));
            const fade = clamp(drawT / 0.05, 0, 1) * clamp((1 - drawT) / 0.08, 0, 1);
            tip.style.opacity = (fade * op).toFixed(3);
          } else {
            tip.style.opacity = '0';
          }
        }

        ph._dots.forEach((d, di) => {
          const th = TH_LIVE[+d.dataset.di];
          const rev = clamp((drawT - (th - 0.04)) / 0.06, 0, 1);
          d.style.opacity = rev.toFixed(3);
          const ring = ph._rings[di];
          if (drawT >= th && op > 0.2) {
            if (!d._landed) d._landed = now;
          } else if (drawT < th - 0.03) {
            d._landed = null;
            if (ring) ring.style.opacity = '0';
          }
          if (d._landed && ring) {
            const e = (now - d._landed) / 640;
            if (e < 1) {
              ring.setAttribute('r', (9 + e * 22).toFixed(1));
              ring.setAttribute('stroke-width', (2.5 * (1 - e) + 0.4).toFixed(2));
              ring.style.opacity = ((1 - e) * 0.55 * op).toFixed(3);
            } else {
              ring.style.opacity = '0';
            }
            const de = (now - d._landed) / 320;
            const ds = de < 1 ? 1 + 0.55 * (1 - de) * Math.sin(Math.min(de, 1) * Math.PI) : 1;
            d.setAttribute('r', (9 * ds).toFixed(2));
          } else if (d) {
            d.setAttribute('r', '9');
          }
        });

        ph._markers.forEach((m) => {
          const th = TH_LIVE[+m.dataset.di];
          const r = clamp((drawT - (th - 0.06)) / 0.10, 0, 1);
          const e = easeOut(r);
          m.style.opacity = e.toFixed(3);
          m.style.transform = 'translateY(' + ((1 - e) * 16).toFixed(1) + 'px)';
        });
        ph._counts.forEach((c) => {
          const mk = c.closest('.cap-j-marker');
          const th = TH_LIVE[+mk.dataset.di];
          if (drawT >= th - 0.02 && op > 0.3) {
            if (!c._counting && !c._done) c._counting = now;
          } else if (op < 0.1) {
            c._counting = null; c._done = false;
          }
          if (c._counting) {
            const to = parseInt(c.dataset.to, 10);
            const e = clamp((now - c._counting) / 720, 0, 1);
            c.textContent = Math.round(to * easeOut(e));
            if (e >= 1) { c._done = true; c._counting = null; }
          }
        });

        if (ph._word) {
          const wp = easeOut(clamp((local - 0.02) / 0.38, 0, 1));
          ph._word.style.clipPath = reduce ? 'none' : 'inset(0 ' + ((1 - wp) * 100).toFixed(1) + '% 0 0)';
          if (!reduce) {
            if (wp >= 0.99 && op > 0.6) {
              if (!ph._sweepStart) ph._sweepStart = now;
            } else if (op < 0.2) { ph._sweepStart = null; }
            if (ph._sweepStart) {
              const e = (now - ph._sweepStart) / 950;
              const posx = e < 1 ? (150 - e * 210) : -60;
              ph._wordSpans.forEach((sp) => { sp.style.backgroundPositionX = posx.toFixed(0) + '%'; });
            }
          }
        }

        const shim = ph._shimmer;
        if (shim) {
          if (!reduce && drawT >= 0.995 && op > 0.35) {
            const sp = (now % 1500) / 1500;
            const pt = path.getPointAtLength(len * sp);
            shim.setAttribute('cx', pt.x.toFixed(1));
            shim.setAttribute('cy', pt.y.toFixed(1));
            shim.style.opacity = (Math.sin(sp * Math.PI) * 0.6 * op).toFixed(3);
          } else {
            shim.style.opacity = '0';
          }
        }
      });

      // Opacity-weighted horizon shift — slides smoothly through crossfades,
      // holds its last value outside the band (den ~ 0 there). The shift is
      // in stage-design px; the sky is a pin-level (screen px) element now.
      if (skyImg && shiftDen > 0.05) {
        skyImg.style.transform = 'translateY(' + ((shiftNum / shiftDen) * stageScale).toFixed(1) + 'px)';
      }

      skyTints.forEach((tn) => { tn.style.opacity = (clamp(g, 0, 1) * 0.85).toFixed(3); });
      rails.forEach((rl, i) => {
        const on = i === active;
        rl.style.opacity = on ? '1' : '0.4';
        rl.style.transform = on ? 'scale(1.5)' : 'scale(1)';
      });
    };

    const tick = () => {
      // Off-screen: skip ALL journey work (lerp + per-frame path math) —
      // the page runs several rAF systems and this one is the heaviest.
      if (inView) {
        curG += (targetG - curG) * (reduce ? 1 : smooth);
        if (Math.abs(targetG - curG) < 0.00006) curG = targetG;
        update(curG);
      } else {
        curG = targetG; // arrive settled when scrolled back into view
      }
      this._jRaf = requestAnimationFrame(tick);
    };

    rails.forEach((rl) => rl.addEventListener('click', () => {
      const i = parseInt(rl.dataset.i, 10);
      const total = host.offsetHeight - capVH();
      const y = window.scrollY + host.getBoundingClientRect().top + ((i + 0.5) / 3) * total;
      window.scrollTo({ top: y, behavior: reduce ? 'auto' : 'smooth' });
    }));

    if (!reduce) {
      pin.addEventListener('mousemove', (e) => {
        const r = pin.getBoundingClientRect();
        mx = clamp(((e.clientX - r.left) / r.width - 0.5) * 2, -1, 1);
        my = clamp(((e.clientY - r.top) / r.height - 0.5) * 2, -1, 1);
      });
      pin.addEventListener('mouseleave', () => { mx = 0; my = 0; });
    }

    const onResize = () => {
      // Crossing the portrait breakpoint (e.g. phone rotation) rebuilds the
      // whole section with the other composition
      if ((window.innerWidth < Math.min(720, capVH() * 0.85)) !== PORTRAIT) {
        this._jCleanup();
        host.remove();
        const oldCss = document.getElementById('cap-journey-css');
        if (oldCss) oldCss.remove();
        this._setupJourneyPinned();
        return;
      }
      if (this._jComputeDelta) {
        const nd = this._jComputeDelta();
        if (nd !== this._jDelta) {
          this._jDelta = nd;
          if (this._shiftJourney) this._shiftJourney();
          if (this._runAdjust) this._runAdjust();
          if (this._fit) this._fit();
        }
      }
      layout();
      onScroll();
    };

    layout();
    onScroll();
    update(targetG);
    // Marker boxes measured before Montserrat lands are narrow — remeasure
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => {
        phases.forEach((ph) => { ph._mBoxes = null; });
        layout();
      });
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onResize);
    this._jRaf = requestAnimationFrame(tick);
    this._jCleanup = () => {
      window.removeEventListener('scroll', onScroll);
      window.removeEventListener('resize', onResize);
      if (this._jRaf) cancelAnimationFrame(this._jRaf);
    };
  }

  _setupStatCounters() {
    // PREMIUM PASS: odometer digit rolls. Every large stat figure (leaf nodes,
    // >=55px — catches "$500", "135 Acres", "16 Assets", "75 Years+", "10 Years")
    // rolls each digit through a masked 0-9 column into place.
    const scaler = document.getElementById('cap-scaler');
    if (!scaler) return;

    // Hide the baked "135 Acres / Total Land Area" and "75 Years" stats:
    // both are replaced by the white #cap-135 / #cap-75 blocks (the baked
    // copies' inherited color renders black in some browsers, and they'd
    // sit inside the relocated staircase zone).
    [...scaler.querySelectorAll('span, div')].forEach(el => {
      if (el.closest('#cap-135') || el.closest('#cap-75')) return;
      const top = parseFloat(el.style.top) || 0;
      if (top < 1700 || top > 2200) return;
      const t = (el.textContent || '').trim().replace(/\s+/g, ' ');
      if (t === 'Total Land Area' || t === 'Leadership Experience' ||
          (/Acres$/.test(t) && parseFloat(el.style.left) < 400) ||
          (/Years\+?$/.test(t) && parseFloat(el.style.left) > 600)) {
        el.style.display = 'none';
      }
    });
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    // Natural glyph widths per element font (canvas measureText): the digit
    // masks are sized to their OWN digit's width so a stat renders exactly
    // as wide as the plain text would (a column's widest-digit width used to
    // pad "1"s and squeeze "0"s, stretching stats past the Figma tracking).
    const measCtx = document.createElement('canvas').getContext('2d');
    const naturalW = (el, text) => {
      const cs = window.getComputedStyle(el);
      measCtx.font = cs.fontStyle + ' ' + cs.fontWeight + ' ' + cs.fontSize + ' ' + cs.fontFamily;
      let w = measCtx.measureText(text).width;
      const ls = parseFloat(cs.letterSpacing);
      if (!isNaN(ls)) w += ls * text.length;
      return w;
    };
    const els = [...scaler.querySelectorAll('div, span')].filter(el => {
      if (el.querySelector('*') || el.dataset.capOdo) return false;
      const txt = (el.textContent || '').trim();
      if (!txt || txt.length > 12 || !/\d/.test(txt)) return false;
      const fs = parseFloat(window.getComputedStyle(el).fontSize) || 0;
      return fs >= 55;
    });
    els.forEach(el => {
      el.dataset.capOdo = '1';
      el.dataset.capOdoText = (el.textContent || '').trim();
      if (reduced) return; // leave static text
      // Rebuild from the RAW text: leading/trailing spaces are real layout
      // (e.g. "$500 " ahead of an inline "Mn+" sibling) — trimming them
      // glued the unit to the digits.
      const txt = (el.textContent || '').replace(/[\u2028\u2029]/g, ' ');
      el.textContent = '';
      const rolls = [];
      [...txt].forEach(ch => {
        if (!/\d/.test(ch)) {
          const s = document.createElement('span');
          s.textContent = ch;
          s.style.whiteSpace = 'pre';
          el.appendChild(s);
          return;
        }
        // Mask holds a column of 0-9 twice; rolling to 10+digit passes a full
        // cycle before landing. Initially shows the real digit (offset digit).
        const digit = parseInt(ch, 10);
        const mask = document.createElement('span');
        // An overflow:hidden inline-block baselines at its bottom EDGE, not the
        // glyph's baseline, so the digit (which sits ~0.137em higher inside the
        // 1em box) rides up above the surrounding "$"/"Mn+" text. Nudge the mask
        // down by that descent so the digit baseline lands on the text baseline.
        mask.style.cssText = 'display:inline-block; overflow:hidden; height:1em; line-height:1em; vertical-align:-0.137em;';
        mask.style.width = naturalW(el, ch).toFixed(2) + 'px';
        const col = document.createElement('span');
        col.style.cssText = 'display:block; will-change:transform; transform:translateY(-' + digit + 'em);';
        for (let r = 0; r < 2; r++) {
          for (let d = 0; d <= 9; d++) {
            const cell = document.createElement('span');
            cell.textContent = String(d);
            cell.style.cssText = 'display:block; height:1em; line-height:1em;';
            col.appendChild(cell);
          }
        }
        mask.appendChild(col);
        el.appendChild(mask);
        rolls.push({ col, digit });
      });
      if (!rolls.length) return;
      const io = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (!entry.isIntersecting) return;
          io.disconnect();
          rolls.forEach(({ col, digit }, i) => {
            col.style.transition = 'none';
            col.style.transform = 'translateY(0)';
            void col.offsetHeight; // reflow so the jump to 0 doesn't animate
            col.style.transition = 'transform 1.5s var(--cap-ease-expo) ' + (i * 0.09) + 's';
            col.style.transform = 'translateY(-' + (10 + digit) + 'em)';
          });
        });
      }, { threshold: 0.4 });
      io.observe(el);
    });

    // Value/unit tracking ("$500 Mn+"): the baked value span carries a fixed
    // width with dead room after the digits, so the unit drifted wide of the
    // Figma tracking. Release the width and guarantee exactly one word space
    // between value and unit. Re-run on delays: the frame can re-render.
    const tightenValueUnitPairs = () => {
      // A line-split pass can race the odometer and wrap a stat's content in
      // an inline-block overflow:hidden line mask — which baselines at its
      // BOTTOM edge, sinking the digits ~10px below the unit. Unwrap any
      // such foreign wrapper (our digit masks stay: they hold the columns).
      const unwrapForeign = (host) => {
        for (const child of [...host.children]) {
          const st = child.style;
          if (st.overflow !== 'hidden' || st.display !== 'inline-block') continue;
          if (st.height === '1em') continue; // our own digit mask
          const containsMask = [...child.querySelectorAll('span')].some(
            s2 => s2.style.overflow === 'hidden'
          );
          if (containsMask) {
            // foreign wrapper AROUND our digit masks → unwrap (our own
            // masks contain only the rolling column, never another
            // overflow-hidden span)
            while (child.firstChild) host.insertBefore(child.firstChild, child);
            child.remove();
          } else if (!(child.textContent || '').trim() && !child.firstElementChild) {
            child.remove(); // empty leftover wrapper
          }
        }
      };
      for (const odoEl of scaler.querySelectorAll('[data-cap-odo]')) unwrapForeign(odoEl);
      for (const mnEl of scaler.querySelectorAll('span')) {
        const unit = (mnEl.textContent || '').trim();
        if (unit !== 'Mn+' && unit !== 'Mn' && unit !== 'Cr+' && unit !== 'Cr') continue;
        if (!mnEl.getClientRects().length) continue;
        const prev = mnEl.previousElementSibling;
        if (!prev || !/\d/.test(prev.textContent || '')) continue;
        unwrapForeign(prev); // re-rendered copies can lose data-cap-odo
        if (!prev.dataset.capPairTight) {
          prev.dataset.capPairTight = '1';
          prev.style.width = 'auto';
        }
        if (!/\s$/.test(prev.textContent || '')) {
          const sp = document.createElement('span');
          sp.textContent = ' ';
          sp.style.whiteSpace = 'pre';
          prev.appendChild(sp);
        }
      }
    };
    tightenValueUnitPairs();
    setTimeout(tightenValueUnitPairs, 800);
    setTimeout(tightenValueUnitPairs, 2000);
    setTimeout(tightenValueUnitPairs, 4000);
  }

  _setupReveal() {
    const reveal = document.getElementById('cap-reveal');
    const stat75 = document.getElementById('cap-75');
    if (!reveal) return;
    // Reduced motion: show the finished state immediately, no scroll scrub
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      [...reveal.querySelectorAll('.cap-stair')].forEach(s => { s.style.transform = 'scaleX(1)'; });
      if (stat75) { stat75.style.opacity = '1'; stat75.style.transform = 'none'; }
      return;
    }
    const stairs = [...reveal.querySelectorAll('.cap-stair')];
    const N = stairs.length;
    const clamp = (v) => v < 0 ? 0 : v > 1 ? 1 : v;
    const easeInOutQuad = (t) => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

    this._onRevealScroll = () => {
      const r = reveal.getBoundingClientRect();
      const vh = window.innerHeight;
      
      // Calculate progress p: 0 when the reveal top is near the bottom of viewport, 
      // 1 when it's well above it.
      const p = clamp((vh * 0.85 - r.top) / (vh * 0.85));
      
      // We want a staggered reveal starting from the bottom stair (index 3) to the top stair (index 0)
      const span = 0.55;
      const stagger = 0.15;
      
      stairs.forEach((stair, i) => {
        // Since i=0 is top, i=1 is middle, i=2 is bottom,
        // and we want bottom (i=2) to start first, middle (i=1) second, top (i=0) third:
        const delay = (N - 1 - i) * stagger;
        const stairProgress = clamp((p - delay) / span);
        const easedProgress = easeInOutQuad(stairProgress);
        
        stair.style.transform = 'scaleX(' + easedProgress + ')';
      });

      if (stat75) {
        // Rise WITH the stairs, not after them: the old window (0.55 → 0.95)
        // needed the stair container at the viewport top for full opacity,
        // so in normal scrolling the stat read as empty red space ("design
        // incomplete" — client). Full by p 0.6, i.e. as the stairs build.
        const fp = clamp((p - 0.15) / 0.45);
        stat75.style.opacity = String(fp);
        stat75.style.transform = 'translateY(' + (30 * (1 - fp)) + 'px)';
      }
    };
    this._onRevealScroll();
    window.addEventListener('scroll', this._onRevealScroll, { passive: true });
    window.addEventListener('resize', this._onRevealScroll);
  }
